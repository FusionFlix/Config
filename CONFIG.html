        const DEFAULT_SOCIALS = {
            whatsappGroup: "https://chat.whatsapp.com/GU9mxEeGn2LCGsUxsW9KiD?s=cl&p=a&mlu=1",

            tiktok: "https://www.tiktok.com/@fusionflix2.1?_r=1&_t=ZS-97DD8LHaJzc"
        };

        const DEFAULT_META = {
            title: "FSNFLIX | Tu Portal de Streaming Premium",
            description: "Adquiere cuentas de streaming estables y garantizadas de Netflix, Disney+, Prime Video, Max y más.",
            keywords: "streaming premium, netflix barato peru, yape, plin, binance pay, fusionflix",
            ogImage: "https://image.tmdb.org/t/p/w1280/56v2dnL56CNm6CHgmqXfw88llm6.jpg",
            ogTitle: "FSNFLIX | Cuentas Streaming 4K"
        };

        const PLATFORM_THEMES = {
          "Netflix": { brandColor: "from-red-600 to-red-800", textColor: "text-red-500", borderActive: "border-red-600", accentBg: "bg-red-600", badgeBg: "bg-red-950/70 text-red-300 border-red-900/50" },
          "Disney+": { brandColor: "from-cyan-500 to-blue-600", textColor: "text-cyan-400", borderActive: "border-cyan-500", accentBg: "bg-cyan-500", badgeBg: "bg-cyan-950/70 text-cyan-300 border-cyan-900/50" },
          "Crunchyroll": { brandColor: "from-amber-500 to-orange-600", textColor: "text-amber-500", borderActive: "border-amber-500", accentBg: "bg-amber-500", badgeBg: "bg-amber-950/70 text-amber-450 border-amber-800" },
          "Max": { brandColor: "from-indigo-600 to-purple-800", textColor: "text-indigo-400", borderActive: "border-indigo-600", accentBg: "bg-indigo-650", badgeBg: "bg-indigo-950/70 text-indigo-300 border-indigo-900/50" },
          "Prime Video": { brandColor: "from-sky-400 to-blue-500", textColor: "text-sky-400", borderActive: "border-sky-500", accentBg: "bg-sky-500", badgeBg: "bg-sky-950/70 text-sky-300 border-sky-900/50" },
          "Apple TV+": { brandColor: "from-neutral-400 to-neutral-600", textColor: "text-neutral-400", borderActive: "border-neutral-400", accentBg: "bg-neutral-300", badgeBg: "bg-neutral-900/70 text-neutral-350 border-neutral-700/50" },
          "ViX Premium": { brandColor: "from-orange-500 to-orange-700", textColor: "text-orange-500", borderActive: "border-orange-600", accentBg: "bg-orange-600", badgeBg: "bg-orange-950/70 text-orange-300 border-orange-900/50" },
          "Magis TV": { brandColor: "from-yellow-500 to-yellow-700", textColor: "text-yellow-500", borderActive: "border-yellow-500", accentBg: "bg-yellow-500", badgeBg: "bg-yellow-950/70 text-yellow-300 border-yellow-900/50" }
        };

        const VIDEO_PLATFORMS = ["Netflix", "Disney+", "Crunchyroll", "Max", "Prime Video", "Apple TV+", "ViX Premium", "Magis TV"];

        const PLATFORM_PROVIDERS = {
          "Netflix": { id: 8, name: "Netflix" }, "Disney+": { id: 337, name: "Disney Plus" },
          "Crunchyroll": { id: 283, name: "Crunchyroll" }, "Max": { id: 1899, name: "Max" },
          "Prime Video": { id: 9, name: "Amazon Prime Video" }, "Apple TV+": { id: 350, name: "Apple TV Plus" },
          "ViX Premium": { id: 1720, name: "ViX" }
        };

        const getFeaturesList = (features) => {
            if (!features) return [];
            if (Array.isArray(features)) return features;
            if (typeof features === 'string') return features.split('\n').map(f => f.trim()).filter(Boolean);
            return [];
        };

        const bytesToBase64 = (bytes) => {
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        };

        const PlatformLogo = ({ platform, sizeClass = "h-8", shopCatalog = [] }) => {
            const srv = shopCatalog?.find(s => s.name.toLowerCase() === platform?.toLowerCase()) || MASTER_SERVICES_DB.find(s => s.name.toLowerCase() === platform?.toLowerCase());
            if (srv && srv.logoUrl) return <img src={srv.logoUrl} alt={platform} className={`${sizeClass} w-auto object-contain filter drop-shadow-sm`} />;
            return <span className={`text-xs font-black uppercase tracking-widest text-white`}>{platform}</span>;
        };

        const App = () => {
          const [viewTab, setViewTab] = useState("shop");
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          
          // Slider y Películas
          const [movies, setMovies] = useState(DEFAULT_MOVIES);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [slideProgress, setSlideProgress] = useState(0);

          // Tienda
          const [shopCatalog, setShopCatalog] = useState(MASTER_SERVICES_DB);
          const [slideSpeed, setSlideSpeed] = useState(6000); 
          const [editingStoreService, setEditingStoreService] = useState(null);
          const [showPlatformSelector, setShowPlatformSelector] = useState(false);

          // Configuración Dinámica Integral
          const [whatsappPhone, setWhatsappPhone] = useState("51986193615");
          const [paymentMethods, setPaymentMethods] = useState(DEFAULT_PAYMENTS);
          const [socials, setSocials] = useState(DEFAULT_SOCIALS);
          const [logoConfig, setLogoConfig] = useState({ type: "text", text: "FSNFLIX", url: "" });
          const [metaTags, setMetaTags] = useState(DEFAULT_META);

          // === ESTADOS PARA EL ESPEJO DE MEMORIA (DETECTA CAMBIOS REALES) ===
          const [initialMoviesString, setInitialMoviesString] = useState(null);
          const [initialConfigString, setInitialConfigString] = useState(null);
          
          const [hasUnsavedMovies, setHasUnsavedMovies] = useState(false);
          const [hasUnsavedConfig, setHasUnsavedConfig] = useState(false);

          // Github Sincronización
          const [gitHubToken, setGitHubToken] = useState("");
          const [connectionStatus, setConnectionStatus] = useState("disconnected"); 
          const [isSavingServer, setIsSavingServer] = useState(false);
          const [showSuccessModal, setShowSuccessModal] = useState(null);
          
          // Escáner TMDB
          const currentYear = new Date().getFullYear();
          const dynamicYears = [
            { label: "Todos los años", value: "Todos" },
            { label: `Desde ${currentYear - 2}`, value: `${currentYear - 2}` },
            { label: `Desde ${currentYear - 1}`, value: `${currentYear - 1}` },
            { label: `Desde ${currentYear} (Actual)`, value: `${currentYear}` },
            { label: `Exclusivo ${currentYear + 1} (Nuevos)`, value: `${currentYear + 1}` },
            { label: `Exclusivo ${currentYear + 2} (Futuro)`, value: `${currentYear + 2}` }
          ];

          const [targetPlatform, setTargetPlatform] = useState("Netflix");
          const [customSearchQuery, setCustomSearchQuery] = useState("");
          const [minYearFilter, setMinYearFilter] = useState(`${currentYear}`);
          const [isScanning, setIsScanning] = useState(false);
          const [scannedCatalog, setScannedCatalog] = useState([]);
          const [selectedScannedIds, setSelectedScannedIds] = useState([]);
          
          const [showJsonEditor, setShowJsonEditor] = useState(false);
          const [jsonInput, setJsonInput] = useState("");
          const [notification, setNotification] = useState(null);
          
          const progressInterval = useRef(null);
          const tokenDebounceRef = useRef(null);

          const currentMovie = movies[currentIndex] || DEFAULT_MOVIES[0];
          const activeTheme = PLATFORM_THEMES[currentMovie?.platform] || PLATFORM_THEMES["Netflix"];

          const showNotification = useCallback((message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3500);
          }, []);

          // === GITHUB CONNEXIÓN ===
          const verifyGitHubAccess = useCallback(async (token) => {
              const cleanToken = token.trim();
              if (!cleanToken) return setConnectionStatus("disconnected");
              setConnectionStatus("checking");
              try {
                  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`, {
                      headers: { "Authorization": `Bearer ${cleanToken}`, "Accept": "application/vnd.github.v3+json" }
                  });
                  if (res.ok) {
                      setConnectionStatus("connected");
                  } else {
                      setConnectionStatus("error");
                      if (res.status === 401) showNotification("Token incorrecto o vencido", "error");
                      else if (res.status === 403) showNotification("Límite de API o falta de permisos", "error");
                  }
              } catch (e) { setConnectionStatus("error"); }
          }, []);

          // Helper para construir el objeto de configuración actual
          const getCurrentConfigObj = useCallback(() => {
              return {
                  globalSettings: { 
                      slideSpeed, 
                      whatsappPhone,
                      logoType: logoConfig.type, 
                      logoText: logoConfig.text, 
                      logoUrl: logoConfig.url 
                  },
                  services: shopCatalog.map(s => ({ 
                      ...s, 
                      features: Array.isArray(s.features) ? s.features : s.features.split('\n').map(f => f.trim()).filter(Boolean) 
                  })),
                  paymentMethods, 
                  socials, 
                  metaTags
              };
          }, [slideSpeed, whatsappPhone, logoConfig, shopCatalog, paymentMethods, socials, metaTags]);

          // === VIGILANTE DE CAMBIOS: Detecta de forma inteligente si la configuración o películas han cambiado ===
          useEffect(() => {
              if (initialMoviesString) {
                  setHasUnsavedMovies(JSON.stringify(movies) !== initialMoviesString);
              }
          }, [movies, initialMoviesString]);

          useEffect(() => {
              if (initialConfigString) {
                  setHasUnsavedConfig(JSON.stringify(getCurrentConfigObj()) !== initialConfigString);
              }
          }, [getCurrentConfigObj, initialConfigString]);

          // === CARGA DESDE GITHUB (INICIALIZACIÓN DEL ESPEJO DE MEMORIA) ===
          useEffect(() => {
            const savedToken = localStorage.getItem("fsnflix_github_token");
            if (savedToken) { setGitHubToken(savedToken); verifyGitHubAccess(savedToken); }

            const fetchAllData = async () => {
              const ts = new Date().getTime();
              
              // Cargar peliculas.json
              try {
                const resMovies = await fetch(`${GITHUB_CATALOG_URL}?t=${ts}`);
                if (resMovies.ok) {
                  const data = await resMovies.json();
                  if (Array.isArray(data) && data.length > 0) {
                      setMovies(data);
                      setInitialMoviesString(JSON.stringify(data));
                  }
                } else {
                    setInitialMoviesString(JSON.stringify(DEFAULT_MOVIES));
                }
              } catch (e) { setInitialMoviesString(JSON.stringify(DEFAULT_MOVIES)); }

              // Cargar tienda_config.json
              try {
                const resStore = await fetch(`${GITHUB_STORE_URL}?t=${ts}`);
                
                // Construimos un objeto robusto con los datos que lleguen o con valores por defecto
                let loadedConfig = {
                    globalSettings: { slideSpeed: 6000, whatsappPhone: "51986193615", logoType: "text", logoText: "FSNFLIX", logoUrl: "" },
                    services: MASTER_SERVICES_DB.map(s => ({ ...s, features: Array.isArray(s.features) ? s.features : s.features.split('\n').map(f=>f.trim()).filter(Boolean) })),
                    paymentMethods: DEFAULT_PAYMENTS,
                    socials: DEFAULT_SOCIALS,
                    metaTags: DEFAULT_META
                };

                if (resStore.ok) {
                  const data = await resStore.json();
                  if (data.globalSettings) loadedConfig.globalSettings = { ...loadedConfig.globalSettings, ...data.globalSettings };
                  if (Array.isArray(data.services) && data.services.length > 0) {
                      loadedConfig.services = data.services.map(s => ({ ...s, features: Array.isArray(s.features) ? s.features : s.features.split('\n').map(f=>f.trim()).filter(Boolean) }));
                  }
                  if (Array.isArray(data.paymentMethods) && data.paymentMethods.length > 0) loadedConfig.paymentMethods = data.paymentMethods;
                  if (data.socials) loadedConfig.socials = { ...loadedConfig.socials, ...data.socials };
                  if (data.metaTags) loadedConfig.metaTags = { ...loadedConfig.metaTags, ...data.metaTags };
                }

                // Asignamos los valores limpios al estado de React
                setSlideSpeed(loadedConfig.globalSettings.slideSpeed);
                setWhatsappPhone(loadedConfig.globalSettings.whatsappPhone);
                setLogoConfig({ type: loadedConfig.globalSettings.logoType, text: loadedConfig.globalSettings.logoText, url: loadedConfig.globalSettings.logoUrl });
                setShopCatalog(loadedConfig.services.map(s => ({ ...s, features: Array.isArray(s.features) ? s.features.join('\n') : s.features })));
                setPaymentMethods(loadedConfig.paymentMethods);
                setSocials(loadedConfig.socials);
                setMetaTags(loadedConfig.metaTags);

                // Fijamos el espejo inicial para comparaciones futuras
                setInitialConfigString(JSON.stringify(loadedConfig));

              } catch (e) { console.log("Error Configuración Tienda"); }
            };
            fetchAllData();
          }, [verifyGitHubAccess]);

          const handleTokenChange = (e) => {
              const t = e.target.value; setGitHubToken(t); localStorage.setItem("fsnflix_github_token", t);
              if (tokenDebounceRef.current) clearTimeout(tokenDebounceRef.current);
              tokenDebounceRef.current = setTimeout(() => verifyGitHubAccess(t), 800);
          };

          // === ESCRIBIR DIRECTAMENTE EN GITHUB Y REINICIAR ESPEJO DE MEMORIA ===
          const saveFileToGitHub = async (filename, contentString) => {
              const cleanToken = gitHubToken.trim();
              if (!cleanToken) return showNotification("Ingresa tu Token de GitHub para guardar", "error");
              setIsSavingServer(true);
              const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filename}`;
              try {
                  const getRes = await fetch(url, { headers: { "Authorization": `Bearer ${cleanToken}` } });
                  let sha = null; if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
                  
                  const utf8Bytes = new TextEncoder().encode(contentString);
                  const base64Content = bytesToBase64(utf8Bytes);
                  const body = { message: `Sincronización Panel: ${filename}`, content: base64Content, branch: "main" };
                  if (sha) body.sha = sha;

                  const putRes = await fetch(url, {
                      method: "PUT", headers: { "Authorization": `Bearer ${cleanToken}`, "Content-Type": "application/json" },
                      body: JSON.stringify(body)
                  });
                  
                  if (putRes.ok) {
                      // Al guardar con éxito, actualizamos nuestro string base para que los botones detecten que "ya no hay cambios"
                      if (filename === "peliculas.json") {
                          setInitialMoviesString(JSON.stringify(movies));
                      } else {
                          setInitialConfigString(JSON.stringify(getCurrentConfigObj()));
                      }
                      setShowSuccessModal({ filename, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                  } else {
                      throw new Error("Fallo al guardar. Revisa tus permisos.");
                  }
              } catch (e) { showNotification(e.message, "error"); } finally { setIsSavingServer(false); }
          };

          const commitCatalogToGitHub = () => saveFileToGitHub("peliculas.json", JSON.stringify(movies, null, 2));
          
          const commitStoreToGitHub = () => {
              saveFileToGitHub("tienda_config.json", JSON.stringify(getCurrentConfigObj(), null, 2));
          };

          // === ROTACIÓN DE SLIDER ===
          const nextSlide = useCallback(() => {
            if (movies.length === 0) return;
            setCurrentIndex(prev => (prev === movies.length - 1 ? 0 : prev + 1));
            setSlideProgress(0);
          }, [movies.length]);

          const prevSlide = () => {
            if (movies.length === 0) return;
            setCurrentIndex(prev => (prev === 0 ? movies.length - 1 : prev - 1));
            setSlideProgress(0);
          };

          const resetAutoplay = useCallback(() => {
            setSlideProgress(0);
            if (progressInterval.current) clearInterval(progressInterval.current);
            const step = (100 / slideSpeed) * 100;
            progressInterval.current = setInterval(() => {
                setSlideProgress(prev => { if (prev >= 100) { nextSlide(); return 0; } return prev + step; });
            }, 100);
          }, [nextSlide, slideSpeed]);

          useEffect(() => {
            if (movies.length === 0 || (viewTab !== "shop" && viewTab !== "staged")) return;
            resetAutoplay();
            return () => { if (progressInterval.current) clearInterval(progressInterval.current); };
          }, [resetAutoplay, viewTab, movies.length]);

          // === ESCÁNER OFICIAL TMDB MULTI-BÚSQUEDA ===
          const runSmartScanner = async () => {
            setIsScanning(true);
            setScannedCatalog([]);
            setSelectedScannedIds([]);

            const isSearchQuery = customSearchQuery.trim().length > 0;
            let urlMovie, urlTV;

            if (isSearchQuery) {
              urlMovie = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(customSearchQuery)}&language=es-MX&page=1`;
              urlTV = `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(customSearchQuery)}&language=es-MX&page=1`;
            } else {
              const providerId = PLATFORM_PROVIDERS[targetPlatform]?.id;
              if (!providerId) {
                urlMovie = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&language=es-MX&page=1`;
                urlTV = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&language=es-MX&page=1`;
              } else {
                urlMovie = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&with_watch_providers=${providerId}&watch_region=MX&sort_by=popularity.desc&language=es-MX&page=1`;
                urlTV = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&with_watch_providers=${providerId}&watch_region=MX&sort_by=popularity.desc&language=es-MX&page=1`;
              }

              if (minYearFilter !== "Todos") {
                urlMovie += `&primary_release_date.gte=${minYearFilter}-01-01`;
                urlTV += `&first_air_date.gte=${minYearFilter}-01-01`;
              }
            }

            try {
              const [resM, resTV] = await Promise.all([fetch(urlMovie), fetch(urlTV)]);
              const [dataM, dataTV] = await Promise.all([resM.json(), resTV.json()]);

              let combined = [
                ...(dataM.results || []).map(m => ({ ...m, media_type: 'movie' })),
                ...(dataTV.results || []).map(m => ({ ...m, media_type: 'tv' }))
              ];

              combined.sort((a, b) => b.popularity - a.popularity);

              const formatted = combined
                .filter(item => item.poster_path && item.backdrop_path)
                .filter(item => {
                    if (minYearFilter === "Todos") return true;
                    const release = item.release_date || item.first_air_date || "2000";
                    return parseInt(release.split("-")[0]) >= parseInt(minYearFilter);
                })
                .slice(0, 15)
                .map(item => {
                    const release = item.release_date || item.first_air_date || `${currentYear}`;
                    const genres = item.genre_ids ? item.genre_ids.map(id => TMDB_GENRES[id]).filter(Boolean) : ["Estreno"];
                    return {
                        id: `tmdb-${item.id}-${item.media_type}`,
                        title: item.title || item.name,
                        platform: targetPlatform, 
                        type: item.media_type === "tv" ? "Serie de TV" : "Película",
                        overview: item.overview || "Sin sinopsis disponible en español.",
                        rating: parseFloat(item.vote_average?.toFixed(1)) || 8.0,
                        releaseYear: release.split("-")[0],
                        duration: item.media_type === "tv" ? "Nueva Temp" : "2h 10m",
                        genres: genres.length > 0 ? genres : ["Entretenimiento"],
                        backdropUrl: `https://image.tmdb.org/t/p/w1280${item.backdrop_path}`,
                        posterUrl: `https://image.tmdb.org/t/p/w500${item.poster_path}`
                    };
                });

              setScannedCatalog(formatted);
              if (formatted.length > 0) {
                showNotification(`Se escanearon ${formatted.length} títulos.`, "success");
              } else {
                showNotification("No se encontraron estrenos para los filtros aplicados.", "error");
              }
            } catch (err) {
              console.error(err);
              showNotification("Error de red con TMDb.", "error");
            } finally {
              setIsScanning(false);
            }
          };

          const addSingleMovieToSlider = (movie) => {
            if (movies.some(m => m.title.toLowerCase() === movie.title.toLowerCase())) {
              showNotification("Este título ya está en el slider.", "error");
              return;
            }
            setMovies(prev => [movie, ...prev]);
            showNotification(`"${movie.title}" agregado al Slider`, "success");
          };

          const addSelectedMoviesInBulk = () => {
            if (selectedScannedIds.length === 0) return showNotification("Selecciona al menos un título.", "error");
            const toAdd = scannedCatalog.filter(m => selectedScannedIds.includes(m.id));
            const cleanAdd = toAdd.filter(newM => !movies.some(m => m.title.toLowerCase() === newM.title.toLowerCase()));
            if (cleanAdd.length === 0) return showNotification("Los seleccionados ya existen.", "error");
            setMovies(prev => [...cleanAdd, ...prev]);
            setSelectedScannedIds([]);
            showNotification(`¡${cleanAdd.length} títulos añadidos al Slider!`, "success");
          };

          const toggleScannedSelection = (id) => {
            setSelectedScannedIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
          };

          const deleteMovieFromSlider = (id, e) => {
            if (e) e.stopPropagation();
            if (movies.length <= 1) return showNotification("El slider requiere un mínimo de 1 película.", "error");
            setMovies(prev => prev.filter(m => m.id !== id)); 
            setCurrentIndex(0); 
            resetAutoplay();
            showNotification("Película eliminada.", "success");
          };

          const moveMovieOrder = (index, direction) => {
            const targetIndex = direction === 'up' ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= movies.length) return;
            const updated = [...movies];
            const temp = updated[index];
            updated[index] = updated[targetIndex];
            updated[targetIndex] = temp;
            setMovies(updated);
            setCurrentIndex(0);
          };

          // === GESTIÓN DE TIENDA ===
          const handleQuickAddService = (serviceObj) => {
              if (shopCatalog.some(s => s.id === serviceObj.id)) return showNotification("Esta plataforma ya está activa.", "error");
              setShopCatalog(prev => [...prev, serviceObj]);
              setShowPlatformSelector(false);
              showNotification(`¡${serviceObj.name} añadido al catálogo!`, "success");
          };

          const openCustomServiceModal = () => {
              setShowPlatformSelector(false);
              setEditingStoreService({ id: `srv-${Date.now()}`, name: 'Suscripción Libre', color: '#dc2626', plan: 'Plan Personalizado', price: '19.90', logoUrl: '', features: 'Acceso Premium Completo\nSoporte Garantizado 24/7', btnText: '#ffffff', status: 'Disponible', badge: '' });
          };

          const saveStoreService = () => {
              if(!editingStoreService.name || !editingStoreService.price) return showNotification("Nombre y Precio obligatorios", "error");
              setShopCatalog(prev => {
                  const exists = prev.findIndex(s => s.id === editingStoreService.id);
                  if (exists >= 0) { const n = [...prev]; n[exists] = editingStoreService; return n; }
                  return [...prev, editingStoreService];
              });
              setEditingStoreService(null); 
              showNotification("Suscripción guardada", "success");
          };

          const deleteStoreService = (id) => {
              // Borrado instantáneo (SIN confirm) para evitar bloqueos del navegador en iframes
              setShopCatalog(prev => prev.filter(s => s.id !== id));
              showNotification("Plataforma eliminada de la tienda", "success");
          };

          // === GESTIÓN DE MÉTODOS DE PAGO ===
          const handleAddPaymentMethod = () => {
              const newId = `pay-${Date.now()}`;
              const newMethod = { id: newId, name: 'Nuevo Banco', logo: '', qrs: ['', ''], instructions: 'Instrucciones de depósito aquí.' };
              
              // Se inserta al inicio de la lista para que no tenga que hacer scroll hasta abajo
              setPaymentMethods(prev => [newMethod, ...prev]);
              showNotification("Nuevo método de pago agregado.", "success");
              
              // Animación de destello al nuevo elemento
              setTimeout(() => {
                  const el = document.getElementById(newId);
                  if (el) { 
                      el.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                      el.classList.add('ring-2', 'ring-red-500'); 
                      setTimeout(() => el.classList.remove('ring-2', 'ring-red-500'), 2000); 
                  }
              }, 150);
          };

          const handleDeletePaymentMethod = (id, e) => {
              if (e) e.stopPropagation();
              // Borrado instantáneo (SIN confirm) para evitar bloqueos del navegador en iframes
              setPaymentMethods(prev => prev.filter(p => p.id !== id));
              showNotification("Método de pago eliminado.", "success");
          };

          const handlePaymentMethodChange = (index, field, value) => {
              setPaymentMethods(prev => { const updated = [...prev]; updated[index] = { ...updated[index], [field]: value }; return updated; });
          };

          const handleQrUrlChange = (methodIndex, qrIndex, value) => {
              setPaymentMethods(prev => { const updated = [...prev]; const qrsUpdated = [...updated[methodIndex].qrs]; qrsUpdated[qrIndex] = value; updated[methodIndex] = { ...updated[methodIndex], qrs: qrsUpdated }; return updated; });
          };

          const handleImportJson = (e) => {
            try {
              const rawText = e.target.value; const parsed = JSON.parse(rawText);
              if (Array.isArray(parsed)) { 
                  setMovies(parsed); 
                  setCurrentIndex(0); 
                  setSlideProgress(0); 
                  showNotification("JSON importado.", "success"); 
              }
            } catch (err) {}
          };

          const copyJSONToClipboard = () => {
            const textNode = document.createElement("textarea"); textNode.value = JSON.stringify(movies, null, 2); document.body.appendChild(textNode); textNode.select();
            try { document.execCommand('copy'); showNotification("¡JSON copiado!", "success"); } catch (e) { showNotification("Fallo al copiar.", "error"); }
            document.body.removeChild(textNode);
          };

          const menuItems = [
              { id: 'shop', name: '🎪 Tienda de Cuentas' }, { id: 'staged', name: '🎬 Estrenos del Slider' }, { id: 'scan', name: '🔍 Escáner (TMDB)' },
              { id: 'payments', name: '💳 Métodos de Pago y QRs' }, { id: 'config', name: '🌐 Configuración y SEO' }
          ];

          return (
            <div className="min-h-screen bg-neutral-950 text-white font-sans pb-16 relative">
              
              {/* SIDEBAR DRAWER LATERAL PREMIUM */}
              <div className={`fixed inset-y-0 left-0 w-72 bg-neutral-900 border-r border-neutral-800 z-[150] transform transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                  <div className="p-6 border-b border-neutral-800 flex items-center justify-between">
                      <span className="text-red-500 font-black text-2xl tracking-tighter">FSN CONTROL</span>
                      <button onClick={() => setIsSidebarOpen(false)} className="text-neutral-400 hover:text-white font-bold text-xl">✕</button>
                  </div>
                  <nav className="p-4 space-y-2">
                      {menuItems.map(item => (
                          <button key={item.id} onClick={() => { setViewTab(item.id); setIsSidebarOpen(false); }}
                              className={`w-full py-4 px-5 rounded-xl text-xs font-black uppercase text-left transition-all ${viewTab === item.id ? 'bg-red-655 text-white shadow-lg' : 'text-neutral-400 hover:text-white hover:bg-neutral-850'}`}>
                              {item.name}
                          </button>
                      ))}
                  </nav>
              </div>
              {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[145]" />}

              {/* MODAL GIGANTE NOTIFICACIÓN EMERGENTE AL GUARDAR */}
              {showSuccessModal && (
                  <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[210] flex items-center justify-center p-4 animate-fade-in">
                      <div className="bg-[#111] border border-emerald-500/30 rounded-3xl p-8 max-w-md w-full text-center space-y-4 shadow-[0_20px_50px_rgba(16,185,129,0.15)] relative">
                          <div className="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/40 flex items-center justify-center mx-auto text-4xl mb-6">
                              <svg className="w-10 h-10 text-emerald-500 animate-[pulse_2s_ease-in-out_infinite]" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                              </svg>
                          </div>
                          <h3 className="text-2xl font-black uppercase tracking-wider text-emerald-400">¡Guardado Exitoso!</h3>
                          <p className="text-sm text-neutral-300">
                              Los cambios en <b className="text-white px-2 py-1 bg-neutral-800 rounded-md font-mono text-xs">{showSuccessModal.filename}</b> se han sincronizado con la nube.
                          </p>
                          <p className="text-xs text-neutral-500 pb-2">
                              La web ha sido actualizada a las {showSuccessModal.time}.
                          </p>
                          <button onClick={() => setShowSuccessModal(null)} className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs uppercase tracking-widest rounded-xl transition-all shadow-lg shadow-emerald-600/20 active:scale-95">
                              Continuar Editando
                          </button>
                      </div>
                  </div>
              )}

              {isSavingServer && (
                <div className="fixed inset-0 bg-black/85 backdrop-blur-md z-[200] flex flex-col items-center justify-center gap-4 transition-all duration-300">
                  <div className="relative flex items-center justify-center">
                    <div className="w-16 h-16 rounded-full border-t-4 border-emerald-500 border-r-4 border-r-transparent animate-spin" />
                    <span className="absolute text-xs font-black text-emerald-400">FSN</span>
                  </div>
                  <div className="text-center space-y-1">
                    <h3 className="text-lg font-black uppercase tracking-widest text-white animate-pulse">Sincronizando con GitHub...</h3>
                    <p className="text-xs text-neutral-400">Aplicando todos tus cambios en vivo de forma segura.</p>
                  </div>
                </div>
              )}

              {notification && (
                <div className="fixed top-6 right-6 z-[100] bg-neutral-900 border border-neutral-800 px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 animate-fade-in">
                  <span className={`w-2.5 h-2.5 rounded-full ${notification.type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`} />
                  <p className="text-xs font-black uppercase text-white tracking-wider">{notification.message}</p>
                </div>
              )}

              {/* HEADER NAVBAR CON BOTONES DE GUARDADO INTELIGENTES (INDICADOR DE ESTADO SUCIO) */}
              <header className="fixed top-0 left-0 w-full z-[140] bg-black/90 backdrop-blur-md px-6 py-4 flex flex-col sm:flex-row justify-between items-center border-b border-neutral-800 gap-4">
                <div className="flex items-center gap-4 w-full sm:w-auto">
                  <button onClick={() => setIsSidebarOpen(true)} className="bg-neutral-900 hover:bg-neutral-800 p-2.5 rounded-xl border border-neutral-800 transition-colors active:scale-95">
                      <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
                  </button>
                  <span className="text-red-655 font-black text-2xl md:text-3xl tracking-tighter">FSNFLIX<span className="text-neutral-500 text-base ml-2">ADMIN</span></span>
                </div>

                <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-end">
                    <div className="relative w-full sm:w-64">
                        <input type="password" value={gitHubToken} onChange={handleTokenChange} placeholder="Token GitHub..." className="bg-neutral-900 border border-neutral-800 px-4 py-2.5 pr-8 rounded-xl text-xs w-full text-emerald-400 outline-none" />
                        <div className="absolute right-3 top-3">
                            {connectionStatus === "connected" && <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>}
                            {connectionStatus === "checking" && <div className="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>}
                            {(connectionStatus === "disconnected" || connectionStatus === "error") && <div className="w-2.5 h-2.5 rounded-full bg-neutral-600"></div>}
                        </div>
                    </div>
                    
                    {/* BOTÓN INTELIGENTE: PELICULAS */}
                    <button 
                        onClick={commitCatalogToGitHub} 
                        disabled={isSavingServer}
                        className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-1.5 active:scale-95 ${
                            hasUnsavedMovies
                                ? 'bg-emerald-600 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)] border border-emerald-500 hover:bg-emerald-500'
                                : 'bg-neutral-900 border border-neutral-800 text-neutral-400 hover:text-white hover:bg-neutral-800'
                        }`}
                    >
                        {hasUnsavedMovies ? "⚠️ Guardar Estrenos" : "✓ Peliculas.json"}
                    </button>
                    
                    {/* BOTÓN INTELIGENTE: TIENDA & CONFIG */}
                    <button 
                        onClick={commitStoreToGitHub} 
                        disabled={isSavingServer}
                        className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-1.5 active:scale-95 ${
                            hasUnsavedConfig
                                ? 'bg-emerald-600 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)] border border-emerald-500 hover:bg-emerald-500'
                                : 'bg-neutral-900 border border-neutral-800 text-neutral-400 hover:text-white hover:bg-neutral-800'
                        }`}
                    >
                        {hasUnsavedConfig ? "⚠️ Guardar Config" : "✓ Tienda_config.json"}
                    </button>
                </div>
              </header>

              {/* SIMULADOR SLIDER (Visible en Shop y Staged) */}
              {(viewTab === "shop" || viewTab === "staged") && (
                <div className="mt-[80px]">
                    <section className="relative w-full h-[50vh] min-h-[400px] flex items-end overflow-hidden bg-black select-none">
                      {movies.map((movie, index) => (
                        <div key={movie.id} className={`absolute inset-0 transition-opacity duration-1000 ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                          <img src={movie.backdropUrl} className="w-full h-full object-cover" />
                          <div className="absolute inset-0 bg-gradient-to-t from-neutral-950 via-neutral-950/40 to-transparent" />
                          <div className="absolute inset-0 bg-gradient-to-r from-black/95 to-transparent" />
                        </div>
                      ))}
                      
                      <div className="relative z-20 w-full max-w-7xl mx-auto px-6 md:px-12 pb-10 pt-20">
                        <div className="max-w-2xl space-y-3">
                          <PlatformLogo platform={currentMovie?.platform} sizeClass="h-8 mb-2" />
                          <h1 className="text-3xl md:text-5xl font-black uppercase tracking-tight leading-none">{currentMovie?.title}</h1>
                        </div>
                      </div>
                    </section>

                    <div className="bg-neutral-900 py-3 px-6 md:px-12 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-neutral-800">
                      <div className="flex items-center gap-3">
                        <span className="text-xs font-bold text-neutral-400">Velocidad: {slideSpeed/1000}s</span>
                        <input type="range" min="1000" max="8000" step="500" value={slideSpeed} onChange={e => { setSlideSpeed(Number(e.target.value)); resetAutoplay(); }} className="w-32 accent-red-600 cursor-pointer" />
                      </div>
                      <div className="flex-1 max-w-sm flex flex-col gap-1.5">
                        <div className="h-1 bg-neutral-950 rounded-full overflow-hidden"><div className="h-full bg-red-600 transition-all ease-linear" style={{ width: `${slideProgress}%` }} /></div>
                        <div className="flex justify-end gap-1.5">
                          {movies.map((_, idx) => <button key={idx} onClick={() => { setCurrentIndex(idx); resetAutoplay(); }} className={`h-2 rounded-full transition-all ${idx === currentIndex ? 'bg-red-600 w-6' : 'bg-neutral-700 w-2'}`} />)}
                        </div>
                      </div>
                    </div>
                </div>
              )}

              {/* RENDERIZACIÓN DE PESTAÑAS */}
              <main className={`max-w-7xl mx-auto px-6 py-10 ${(viewTab === 'payments' || viewTab === 'config' || viewTab === 'scan') ? 'mt-[100px]' : ''}`}>
                
                {/* 🎪 TIENDA DE CUENTAS */}
                {viewTab === 'shop' && (
                  <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-end border-b border-neutral-900 pb-4">
                      <h2 className="text-2xl font-black uppercase">Plataformas de Venta</h2>
                      <button onClick={() => setShowPlatformSelector(true)} className="px-4 py-2 bg-red-655 text-white rounded-lg text-xs font-bold shadow-lg active:scale-95">+ Añadir</button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                      {shopCatalog.map(service => (
                        <div key={service.id} className="bg-neutral-900/30 rounded-2xl p-6 relative border border-neutral-800" style={{ borderTopWidth: '4px', borderTopColor: service.color }}>
                             <div className="absolute top-3 right-3 flex gap-1 z-30">
                               <button onClick={() => setEditingStoreService({...service})} className="bg-black/80 hover:bg-neutral-800 p-2 rounded-lg text-white transition-colors">✏️</button>
                               <button onClick={() => deleteStoreService(service.id)} className="bg-black/80 hover:bg-red-950 p-2 rounded-lg text-red-500 transition-colors">🗑️</button>
                             </div>
                             <PlatformLogo platform={service.name} sizeClass="h-8 mb-4" shopCatalog={shopCatalog} />
                             <div className="text-[10px] uppercase font-bold text-neutral-500">{service.plan}</div>
                             <div className="text-3xl font-black text-white mb-4">S/{service.price}</div>
                             <ul className="text-xs text-neutral-400 space-y-2 mb-4">
                               {getFeaturesList(service.features).slice(0,3).map((f, i) => <li key={i}>• {f}</li>)}
                             </ul>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 🎬 ESTRENOS DEL SLIDER */}
                {viewTab === 'staged' && (
                  <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-end border-b border-neutral-900 pb-4">
                        <h2 className="text-2xl font-black uppercase">Estrenos Activos</h2>
                        <button onClick={() => setShowJsonEditor(!showJsonEditor)} className="px-4 py-2 bg-neutral-900 border border-neutral-800 text-xs rounded-xl font-bold">{showJsonEditor ? "Ocultar Editor" : "Ver JSON"}</button>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                      {movies.map((movie, index) => (
                        <div key={movie.id} className="bg-neutral-900/40 rounded-2xl overflow-hidden border border-neutral-900 hover:border-neutral-800 transition-all flex flex-col justify-between">
                          <div className="relative aspect-[2/3] overflow-hidden bg-neutral-950">
                            <img src={movie.posterUrl} className="w-full h-full object-cover" />
                            <div className="absolute top-2 left-2 bg-black/80 px-2 py-1 rounded text-[8px] font-black uppercase border border-white/5">{movie.platform}</div>
                            <button onClick={(e) => deleteMovieFromSlider(movie.id, e)} className="absolute top-2 right-2 bg-red-600 p-1.5 rounded-lg active:scale-90">✕</button>
                          </div>
                          <div className="p-3 bg-neutral-950 space-y-3">
                            <h4 className="font-bold text-xs truncate text-white leading-none">{movie.title}</h4>
                            <div className="flex gap-1">
                              <button disabled={index === 0} onClick={() => moveMovieOrder(index, 'up')} className="flex-1 py-1 bg-neutral-900 hover:bg-neutral-850 text-[10px] font-bold rounded border border-neutral-800 disabled:opacity-30">▲</button>
                              <button disabled={index === movies.length - 1} onClick={() => moveMovieOrder(index, 'down')} className="flex-1 py-1 bg-neutral-900 hover:bg-neutral-855 text-[10px] font-bold rounded border border-neutral-800 disabled:opacity-30">▼</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {showJsonEditor && (
                      <div className="bg-neutral-900/40 border border-neutral-900 rounded-3xl p-6 md:p-8 space-y-4 animate-fade-in mt-6">
                        <div className="flex justify-between items-center">
                          <h4 className="font-bold text-white text-xs uppercase tracking-widest">Base de Datos JSON de Estrenos</h4>
                          <button onClick={copyJSONToClipboard} className="px-4 py-2 bg-red-655 text-xs font-black uppercase rounded-lg">Copiar JSON</button>
                        </div>
                        <textarea value={jsonInput} onChange={handleImportJson} rows={10} className="w-full bg-black text-emerald-400 font-mono text-xs p-4 rounded-xl border border-neutral-855 outline-none focus:border-red-600" placeholder="Pega un arreglo JSON de películas..." />
                      </div>
                    )}
                  </div>
                )}

                {/* 🔍 ESCANER TMDB (GRANDES IMÁGENES Y BOTONES RESALTANTES) */}
                {viewTab === 'scan' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in">
                    <div className="bg-neutral-900/40 border border-neutral-900 p-6 rounded-3xl h-max space-y-5">
                      <div className="space-y-1">
                        <h3 className="text-lg font-black uppercase tracking-wider text-white">Buscador TMDb</h3>
                        <p className="text-neutral-500 text-xs">Busca estrenos en vivo para agregar al Slider.</p>
                      </div>
                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500">Asignar Plataforma</label>
                        <select value={targetPlatform} onChange={e => setTargetPlatform(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs outline-none focus:border-red-655">
                          {VIDEO_PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                      </div>
                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500">Año de Estreno</label>
                        <select value={minYearFilter} onChange={e => setMinYearFilter(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs outline-none focus:border-red-655">
                          {dynamicYears.map(y => <option key={y.value} value={y.value}>{y.label}</option>)}
                        </select>
                      </div>
                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500">Palabra Clave (Opcional)</label>
                        <input type="text" value={customSearchQuery} onChange={e => setCustomSearchQuery(e.target.value)} placeholder="Ej: Avengers" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs outline-none focus:border-red-655" />
                      </div>
                      <button onClick={runSmartScanner} disabled={isScanning} className="w-full py-4 bg-white text-black text-xs font-black uppercase tracking-widest rounded-xl hover:bg-neutral-200 transition-all shadow-lg active:scale-95">{isScanning ? 'Buscando...' : 'Escanear Ahora'}</button>
                    </div>

                    <div className="lg:col-span-2 space-y-4">
                      <div className="flex justify-between items-center">
                        <h4 className="font-bold text-sm uppercase text-neutral-400">Resultados de Búsqueda</h4>
                        {scannedCatalog.length > 0 && <button onClick={addSelectedMoviesInBulk} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-xs font-black uppercase shadow-lg shadow-emerald-600/20 transition-all">Agregar Selección ({selectedScannedIds.length})</button>}
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                        {scannedCatalog.map(movie => {
                          const isChecked = selectedScannedIds.includes(movie.id);
                          return (
                            <div key={movie.id} className={`p-4 rounded-2xl bg-neutral-950 border relative cursor-pointer transition-all ${isChecked ? 'border-emerald-500 ring-2 ring-emerald-500' : 'border-neutral-900 hover:border-neutral-800'}`} onClick={() => toggleScannedSelection(movie.id)}>
                              <input type="checkbox" checked={isChecked} onChange={(e) => { e.stopPropagation(); toggleScannedSelection(movie.id); }} className="absolute top-3 right-3 z-20 w-4.5 h-4.5 accent-emerald-500 cursor-pointer" />
                              <div className="aspect-[2/3] w-full rounded-xl overflow-hidden mb-3">
                                <img src={movie.posterUrl} className="w-full h-full object-cover" />
                              </div>
                              <span className="text-[9px] font-extrabold uppercase text-neutral-500 block mb-1">{movie.type} • {movie.releaseYear}</span>
                              <h5 className="font-bold text-xs truncate text-white mb-2">{movie.title}</h5>
                              
                              <button onClick={(e) => { e.stopPropagation(); addSingleMovieToSlider(movie); }} className="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-[10px] font-black uppercase rounded-lg text-white transition-colors shadow-lg shadow-emerald-500/20 active:scale-95">
                                + Añadir Título
                              </button>
                            </div>
                          );
                        })}
                        {scannedCatalog.length === 0 && <div className="col-span-full py-16 text-center text-neutral-600 text-xs font-bold border-2 border-dashed border-neutral-900 rounded-3xl">La búsqueda está vacía. Escanea películas a la izquierda.</div>}
                      </div>
                    </div>
                  </div>
                )}

                {/* 💳 MÉTODOS DE PAGO Y QRS (DIRECT DELITIONS + AUTO-SCROLL TO TOP) */}
                {viewTab === 'payments' && (
                  <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b border-neutral-900 pb-4">
                      <div>
                        <h2 className="text-3xl font-black uppercase tracking-tight text-white">Métodos de Pago y Códigos QR</h2>
                        <p className="text-neutral-500 text-xs mt-1">Sincroniza y personaliza las billeteras de cobro.</p>
                      </div>
                      <button onClick={handleAddPaymentMethod} className="px-5 py-3 bg-red-655 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg active:scale-95">
                          + Agregar Método
                      </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      {paymentMethods.map((method, methodIdx) => (
                        <div key={method.id} id={method.id} className="bg-neutral-900/40 border border-neutral-900 p-6 rounded-[2rem] space-y-5 relative transition-all duration-300">
                          
                          <button onClick={(e) => handleDeletePaymentMethod(method.id, e)} className="absolute top-4 right-4 bg-black/60 hover:bg-red-600 text-red-500 hover:text-white p-2.5 rounded-xl transition-all z-30">
                              🗑️ Eliminar
                          </button>

                          <div className="border-b border-neutral-800 pb-4 pr-24">
                            <input 
                                type="text" value={method.name} onChange={e => handlePaymentMethodChange(methodIdx, 'name', e.target.value)}
                                className="bg-transparent border-b border-neutral-800 focus:border-red-655 outline-none font-black uppercase text-xl text-white w-full py-1"
                                placeholder="Nombre del Banco"
                            />
                          </div>

                          <div className="space-y-3">
                            <div className="space-y-1">
                              <label className="text-[9px] font-black uppercase text-neutral-500">Enlace del Logotipo (PNG/SVG)</label>
                              <input type="text" value={method.logo} onChange={e => handlePaymentMethodChange(methodIdx, 'logo', e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-3 py-2 rounded-xl text-xs text-neutral-300 font-mono outline-none focus:border-red-655" />
                            </div>

                            <div className="space-y-1">
                              <label className="text-[9px] font-black uppercase text-neutral-500">Instrucciones</label>
                              <textarea value={method.instructions} onChange={e => handlePaymentMethodChange(methodIdx, 'instructions', e.target.value)} rows="2" className="w-full bg-neutral-950 border border-neutral-800 px-3 py-2 rounded-xl text-xs text-neutral-300 outline-none focus:border-red-655 resize-none" />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                              <div className="space-y-1">
                                <label className="text-[9px] font-black uppercase text-neutral-500">Enlace Código QR 1</label>
                                <input type="text" value={method.qrs[0] || ''} onChange={e => handleQrUrlChange(methodIdx, 0, e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-3 py-2 rounded-xl text-[10px] text-neutral-300 font-mono outline-none focus:border-red-655" />
                              </div>
                              <div className="space-y-1">
                                <label className="text-[9px] font-black uppercase text-neutral-500">Enlace Código QR 2</label>
                                <input type="text" value={method.qrs[1] || ''} onChange={e => handleQrUrlChange(methodIdx, 1, e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-3 py-2 rounded-xl text-[10px] text-neutral-300 font-mono outline-none focus:border-red-655" />
                              </div>
                            </div>
                            
                            {/* PREVISUALIZADOR DE CAJAS EN VIVO */}
                            <div className="flex gap-4 justify-start pt-4 border-t border-neutral-800/60 mt-4">
                                <div className="text-center space-y-1.5">
                                    <span className="text-[8px] font-black uppercase text-neutral-500 block tracking-widest">Logo Previa</span>
                                    <div className="h-14 w-24 bg-neutral-950 rounded-xl p-2 border border-neutral-800 flex items-center justify-center overflow-hidden">
                                        {method.logo ? <img src={method.logo} className="max-h-full max-w-full object-contain" onError={(e) => e.target.style.display='none'} /> : <span className="text-[10px] text-neutral-600 font-bold">VACÍO</span>}
                                    </div>
                                </div>
                                {method.qrs.map((qr, qidx) => (
                                    <div key={qidx} className="text-center space-y-1.5">
                                        <span className="text-[8px] font-black uppercase text-neutral-500 block tracking-widest">QR {qidx + 1}</span>
                                        <div className="h-14 w-14 bg-neutral-950 rounded-xl p-1 border border-neutral-800 flex items-center justify-center overflow-hidden">
                                            {qr ? <img src={qr} className="h-full w-full object-cover rounded-md" onError={(e) => e.target.style.display='none'} /> : <span className="text-[10px] text-neutral-600 font-bold">VACÍO</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>

                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 🌐 CONFIGURACIÓN, REDES, LOGO Y SEO */}
                {viewTab === 'config' && (
                  <div className="space-y-8 animate-fade-in">
                    
                    {/* Logotipo de Navbar */}
                    <div className="bg-neutral-900/40 border border-neutral-900 rounded-[2rem] p-6 md:p-8 space-y-6">
                      <div>
                        <span className="text-red-500 font-black text-xs uppercase tracking-widest block">Estética Visual</span>
                        <h3 className="text-2xl font-black uppercase tracking-tight text-white">Logotipo del Portal</h3>
                        <p className="text-xs text-neutral-400">Personaliza cómo se verá el logo de la esquina superior de tu web.</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="space-y-1.5">
                            <label className="text-[10px] font-black uppercase text-neutral-500 block">Tipo de Logotipo</label>
                            <select value={logoConfig?.type || 'text'} onChange={e => { setLogoConfig({...logoConfig, type: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 cursor-pointer font-bold">
                                <option value="text">Texto Plano</option>
                                <option value="image">Imagen URL</option>
                            </select>
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-[10px] font-black uppercase text-neutral-500 block">Texto del Logo</label>
                            <input type="text" value={logoConfig?.text || ''} onChange={e => { setLogoConfig({...logoConfig, text: e.target.value}); }} placeholder="FSNFLIX" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-bold" />
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-[10px] font-black uppercase text-neutral-500 block">URL de Imagen</label>
                            <input type="text" value={logoConfig?.url || ''} onChange={e => { setLogoConfig({...logoConfig, url: e.target.value}); }} placeholder="https://..." className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-mono" />
                        </div>
                      </div>
                    </div>

                    {/* Redes y Contacto */}
                    <div className="bg-neutral-900/40 border border-neutral-900 rounded-[2rem] p-6 md:p-8 space-y-6">
                      <div>
                        <span className="text-red-500 font-black text-xs uppercase tracking-widest block">Comunidad & Soporte</span>
                        <h3 className="text-2xl font-black uppercase tracking-tight text-white">Canales y Contacto del Negocio</h3>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">WhatsApp (Cobros)</label><input type="text" value={whatsappPhone || ''} onChange={e => { setWhatsappPhone(e.target.value); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-bold font-mono" placeholder="Ej: 51986193615" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">Grupo VIP</label><input type="text" value={socials?.whatsappGroup || ''} onChange={e => { setSocials({...socials, whatsappGroup: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-mono" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">Página Facebook</label><input type="text" value={socials?.facebook || ''} onChange={e => { setSocials({...socials, facebook: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-mono" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">TikTok</label><input type="text" value={socials?.tiktok || ''} onChange={e => { setSocials({...socials, tiktok: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-mono" /></div>
                      </div>
                    </div>

                    {/* SEO Meta Tags */}
                    <div className="bg-neutral-900/40 border border-neutral-900 rounded-[2rem] p-6 md:p-8 space-y-6">
                      <div>
                        <span className="text-red-500 font-black text-xs uppercase tracking-widest block">Indexación de Google</span>
                        <h3 className="text-2xl font-black uppercase tracking-tight text-white">Configuración de SEO / Meta Tags</h3>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">Título de la Web</label><input type="text" value={metaTags?.title || ''} onChange={e => { setMetaTags({...metaTags, title: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">Título para Compartir</label><input type="text" value={metaTags?.ogTitle || ''} onChange={e => { setMetaTags({...metaTags, ogTitle: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655" /></div>
                        <div className="space-y-1.5 md:col-span-2"><label className="text-[10px] font-black text-neutral-500 uppercase">Descripción</label><textarea value={metaTags?.description || ''} onChange={e => { setMetaTags({...metaTags, description: e.target.value}); }} rows="2" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 resize-none leading-relaxed" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">Palabras Clave</label><input type="text" value={metaTags?.keywords || ''} onChange={e => { setMetaTags({...metaTags, keywords: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655" /></div>
                        <div className="space-y-1.5"><label className="text-[10px] font-black text-neutral-500 uppercase">URL Miniatura de Compartir (og:image)</label><input type="text" value={metaTags?.ogImage || ''} onChange={e => { setMetaTags({...metaTags, ogImage: e.target.value}); }} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 font-mono" /></div>
                      </div>
                    </div>

                  </div>
                )}
              </main>

              {/* MODAL CREADOR DE PLATAFORMAS TIENDA */}
              {showPlatformSelector && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-fade-in">
                    <div className="bg-neutral-900 border border-neutral-800 w-full max-w-2xl rounded-3xl p-6 md:p-8 shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="flex justify-between items-center border-b border-neutral-800 pb-4">
                            <h3 className="text-xl font-black uppercase text-white">Añadir Suscripción</h3>
                            <button onClick={() => setShowPlatformSelector(false)} className="text-neutral-500 hover:text-white font-black text-xl">✕</button>
                        </div>
                        
                        <div className="overflow-y-auto pt-6 space-y-6 flex-1 scrollbar-thin">
                            <button onClick={openCustomServiceModal} className="w-full bg-neutral-950 hover:bg-neutral-850 border-2 border-neutral-800 border-dashed rounded-2xl p-6 flex flex-col items-center justify-center transition-colors group">
                                <span className="text-3xl mb-2 group-hover:scale-110 transition-transform">✨</span>
                                <h4 className="text-sm font-black text-white uppercase tracking-widest">Crear Plataforma Libre</h4>
                            </button>

                            <div>
                                <h4 className="text-xs font-black uppercase text-neutral-500 mb-4">Catálogo de Integración Rápida</h4>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    {MASTER_SERVICES_DB.map(s => {
                                        if (shopCatalog.some(cat => cat.id === s.id)) return null;
                                        return (
                                            <button key={s.id} onClick={() => handleQuickAddService(s)} className="bg-neutral-950 hover:bg-neutral-800 border border-neutral-800 rounded-xl p-4 flex flex-col items-center gap-3 transition-all" style={{ borderTopWidth: '3px', borderTopColor: s.color }}>
                                                <div className="h-8 flex items-center justify-center">
                                                    {s.logoUrl ? <img src={s.logoUrl} className="max-h-full object-contain" /> : <span className="text-xs font-bold text-white uppercase">{s.name}</span>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
              )}

              {/* EDITOR MODAL DE PLATAFORMA TIENDA */}
              {editingStoreService && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-fade-in">
                    <div className="bg-neutral-900 border border-neutral-800 w-full max-w-md rounded-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center border-b border-neutral-800 pb-3 mb-4">
                            <h3 className="text-xl font-black uppercase text-white">Editar Cuenta</h3>
                            <button onClick={() => setEditingStoreService(null)} className="text-neutral-500 hover:text-white font-black text-xl">✕</button>
                        </div>
                        <div className="space-y-3">
                            <input type="text" value={editingStoreService.name} onChange={e => setEditingStoreService({...editingStoreService, name: e.target.value})} placeholder="Nombre" className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655" />
                            <input type="text" value={editingStoreService.plan} onChange={e => setEditingStoreService({...editingStoreService, plan: e.target.value})} placeholder="Plan / Tipo" className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655" />
                            <input type="text" value={editingStoreService.price} onChange={e => setEditingStoreService({...editingStoreService, price: e.target.value})} placeholder="Precio (S/)" className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655" />
                            <input type="text" value={editingStoreService.logoUrl} onChange={e => setEditingStoreService({...editingStoreService, logoUrl: e.target.value})} placeholder="URL Logo" className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655" />
                            
                            <div className="flex gap-4">
                              <select value={editingStoreService.status} onChange={e => setEditingStoreService({...editingStoreService, status: e.target.value})} className="flex-1 bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655">
                                  <option value="Disponible">🟢 Activo</option>
                                  <option value="Agotado">🔴 Agotado</option>
                              </select>
                              <select value={editingStoreService.badge} onChange={e => setEditingStoreService({...editingStoreService, badge: e.target.value})} className="flex-1 bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655">
                                  <option value="">(Sin Etiqueta)</option>
                                  <option value="OFERTA">Oferta</option>
                                  <option value="RECOMENDADO">Recomendado</option>
                              </select>
                            </div>
                            
                            <textarea value={editingStoreService.features} onChange={e => setEditingStoreService({...editingStoreService, features: e.target.value})} rows="4" placeholder="Beneficios por línea" className="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs text-white outline-none focus:border-red-655 resize-none" />
                        </div>
                        <button onClick={saveStoreService} className="w-full py-3 mt-4 bg-emerald-600 text-white font-black rounded-xl text-xs uppercase shadow-lg shadow-emerald-500/20 hover:bg-emerald-500">Guardar</button>
                    </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
