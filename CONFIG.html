        // BASE DE DATOS DE PLATAFORMAS CON LOS LOGOS OFICIALES ACTUALIZADOS
        const MASTER_SERVICES_DB = [
            { id: 'netflix', name: 'Netflix', color: '#E50914', plan: 'Plan Premium 4K', price: '24.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg', features: 'Calidad 4K HDR\nPerfiles estables con PIN\nEvasión de bloqueo de hogar', btnText: '#ffffff', status: 'Disponible', badge: '' },
            { id: 'disney', name: 'Disney+', color: '#0063E5', plan: 'Plan Estándar', price: '15.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg', features: 'Disney, Pixar y Marvel\nDeportes por ESPN\nResolución 1080p', btnText: '#ffffff', status: 'Disponible', badge: '' },

            { id: 'crunchyroll', name: 'Crunchyroll', color: '#F47521', plan: 'Mega Fan', price: '12.00', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Crunchyroll_Logo.png', features: 'Sin publicidad\nEpisodios estreno simultáneo\nCatálogo completo de anime', btnText: '#000000', status: 'Disponible', badge: '' },
            { id: 'spotify', name: 'Spotify', color: '#1DB954', plan: 'Premium Individual', price: '14.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg', features: 'Música sin anuncios\nEscucha sin conexión\nAudio de alta calidad', btnText: '#000000', status: 'Disponible', badge: 'Oferta' },
            { id: 'youtube', name: 'YouTube', color: '#FF0000', plan: 'Premium Familiar', price: '16.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg', features: 'Videos sin anuncios\nYouTube Music Premium\nReproducción en segundo plano', btnText: '#ffffff', status: 'Disponible', badge: '' },
            { id: 'paramount', name: 'Paramount+', color: '#0064FF', plan: 'Plan Básico', price: '10.90', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/a/a5/Paramount_Plus.svg', features: 'Películas de éxito\nDeportes en vivo\nContenido de Nickelodeon', btnText: '#ffffff', status: 'Disponible', badge: '' },
            { id: 'appletv', name: 'Apple TV+', color: '#ffffff', plan: 'Plan Mensual', price: '15.00', logoUrl: 'https://1000logos.net/wp-content/uploads/2022/02/Apple-TV-Logo-1.png', features: 'Producciones originales Apple\nCalidad visual de alta gama\nAlta fidelidad', btnText: '#000000', status: 'Disponible', badge: '' },
            { id: 'vix', name: 'ViX Premium', color: '#FF6B00', plan: 'Plan Mensual', price: '18.00', logoUrl: 'https://www.hollywoodreporter.com/wp-content/uploads/2024/01/ViX_logo-1-H-2024.jpg', features: 'Liga MX en vivo\nLiga Española exclusiva\nTelenovelas premium', btnText: '#ffffff', status: 'Disponible', badge: '' },
            { id: 'canva', name: 'Canva Pro', color: '#00C4CC', plan: 'Educativo / Equipos', price: '10.00', logoUrl: 'https://edudigital.pro/wp-content/uploads/2024/03/CANVAPRO.png', features: 'Herramientas Pro de diseño\nPlantillas infinitas\nActivación en tu propio correo', btnText: '#000000', status: 'Disponible', badge: '' },
            { id: 'magis', name: 'Magis TV', color: '#FFD700', plan: 'Panel IPTV', price: '20.00', logoUrl: 'https://magisstvapp.com/wp-content/uploads/2026/03/cropped-magiss-tv-app-logo-02-01.png', features: 'Canales en vivo Full HD\nDeportes PPV desbloqueados\nCatálogo de películas VOD', btnText: '#000000', status: 'Disponible', badge: 'RECOMENDADO' },
            { id: 'viki', name: 'Viki Rakuten', color: '#11B3E0', plan: 'Pass Plus', price: '16.00', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/1/18/Rakuten_Viki_Logo.svg', features: 'K-Dramas en estreno\nSubtítulos de alta calidad\nSin anuncios', btnText: '#ffffff', status: 'Disponible', badge: '' }
        ];

        const PLATFORM_THEMES = {
          "Netflix": { brandColor: "from-red-600 to-red-800", textColor: "text-red-500", borderActive: "border-red-600", accentBg: "bg-red-600", badgeBg: "bg-red-950/70 text-red-300 border-red-900/50" },
          "Disney+": { brandColor: "from-cyan-500 to-blue-600", textColor: "text-cyan-400", borderActive: "border-cyan-500", accentBg: "bg-cyan-500", badgeBg: "bg-cyan-950/70 text-cyan-300 border-cyan-900/50" },
          "Crunchyroll": { brandColor: "from-amber-500 to-orange-600", textColor: "text-amber-500", borderActive: "border-amber-500", accentBg: "bg-amber-500", badgeBg: "bg-amber-950/70 text-amber-450 border-amber-800" },
          "Max": { brandColor: "from-indigo-600 to-purple-800", textColor: "text-indigo-400", borderActive: "border-indigo-600", accentBg: "bg-indigo-650", badgeBg: "bg-indigo-950/70 text-indigo-300 border-indigo-900/50" },
          "Prime Video": { brandColor: "from-sky-400 to-blue-500", textColor: "text-sky-400", borderActive: "border-sky-500", accentBg: "bg-sky-500", badgeBg: "bg-sky-950/70 text-sky-300 border-sky-900/50" },
          "Apple TV+": { brandColor: "from-neutral-400 to-neutral-600", textColor: "text-neutral-400", borderActive: "border-neutral-400", accentBg: "bg-neutral-300", badgeBg: "bg-neutral-900/70 text-neutral-350 border-neutral-700/50" },
          "ViX Premium": { brandColor: "from-orange-500 to-orange-700", textColor: "text-orange-500", borderActive: "border-orange-600", accentBg: "bg-orange-600", badgeBg: "bg-orange-950/70 text-orange-300 border-orange-900/50" },
          "Magis TV": { brandColor: "from-yellow-500 to-yellow-700", textColor: "text-yellow-500", borderActive: "border-yellow-500", accentBg: "bg-yellow-500", badgeBg: "bg-yellow-950/70 text-yellow-300 border-yellow-900/50" }
        };

        const VIDEO_PLATFORMS = ["Netflix", "Disney+", "Crunchyroll", "Max", "Prime Video", "Apple TV+", "ViX Premium", "Magis TV"];

        const PLATFORM_PROVIDERS = {
          "Netflix": { id: 8, name: "Netflix" },
          "Disney+": { id: 337, name: "Disney Plus" },
          "Crunchyroll": { id: 283, name: "Crunchyroll" },
          "Max": { id: 1899, name: "Max" },
          "Prime Video": { id: 9, name: "Amazon Prime Video" },
          "Apple TV+": { id: 350, name: "Apple TV Plus" },
          "ViX Premium": { id: 1720, name: "ViX" }
        };

        const getFeaturesList = (features) => {
            if (!features) return [];
            if (Array.isArray(features)) return features;
            if (typeof features === 'string') return features.split('\n').map(f => f.trim()).filter(Boolean);
            return [];
        };

        // Función robusta para Base64 que evita desbordamiento de pila (Call Stack size exceeded)
        const bytesToBase64 = (bytes) => {
            let binary = '';
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        };

        const PlatformLogo = ({ platform, sizeClass = "h-8", shopCatalog = [], isGrayscale = false }) => {
            const activeService = shopCatalog?.find(s => s.name.toLowerCase() === platform?.toLowerCase());
            const fallbackService = MASTER_SERVICES_DB.find(s => s.name.toLowerCase() === platform?.toLowerCase());
            const url = activeService?.logoUrl || fallbackService?.logoUrl;
            
            if (url) {
                return <img src={url} alt={platform} referrerPolicy="no-referrer" className={`max-h-[35px] max-w-[140px] w-auto object-contain object-left filter drop-shadow-sm ${isGrayscale ? 'grayscale opacity-40' : ''}`} />;
            }
            return <span className={`text-xs font-black uppercase tracking-widest text-white ${isGrayscale ? 'opacity-40' : ''}`}>{platform}</span>;
        };

        const App = () => {
          const [viewTab, setViewTab] = useState("shop"); // shop | staged | scan | indexEditor
          const [movies, setMovies] = useState(DEFAULT_MOVIES);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [slideProgress, setSlideProgress] = useState(0);
          const [isTransitioning, setIsTransitioning] = useState(false);

          // ESTADOS PARA LA TIENDA DE CUENTAS
          const [shopCatalog, setShopCatalog] = useState([MASTER_SERVICES_DB[0], MASTER_SERVICES_DB[1], MASTER_SERVICES_DB[2], MASTER_SERVICES_DB[3]]);
          const [slideSpeed, setSlideSpeed] = useState(6000); 
          const [editingStoreService, setEditingStoreService] = useState(null);
          const [showPlatformSelector, setShowPlatformSelector] = useState(false);

          // ESTADOS DE CONTROL DE SINCRONIZACIÓN DE GITHUB (ORIENTADO AL NUEVO REPOS DE STREAMING)
          const [gitHubToken, setGitHubToken] = useState("");
          const [peliculasSync, setPeliculasSync] = useState("Sin Sincronizar"); // "Sincronizando" | "Sincronizado" | "Error"
          const [tiendaSync, setTiendaSync] = useState("Sin Sincronizar");
          const [indexSync, setIndexSync] = useState("Sin Sincronizar");
          const [lastPeliculasTime, setLastPeliculasTime] = useState("");
          const [lastTiendaTime, setLastTiendaTime] = useState("");
          const [lastIndexTime, setLastIndexTime] = useState("");
          const [showSuccessModal, setShowSuccessModal] = useState(null); // { filename: "peliculas.json", time: "16:25" }
          const [tokenError, setTokenError] = useState(false);

          // EDITOR DIRECTO DE INDEX.HTML (NUEVA CARACTERÍSTICA PARA AUTOMATIZAR LA WEB PRINCIPAL)
          const [indexHtmlCode, setIndexHtmlCode] = useState("");

          // ESTADOS DEL ESCÁNER TMDB
          const [targetPlatform, setTargetPlatform] = useState("Netflix");
          const [customSearchQuery, setCustomSearchQuery] = useState("");
          const [minYear, setMinYear] = useState("2025");
          const [isScanning, setIsScanning] = useState(false);
          const [scannedCatalog, setScannedCatalog] = useState([]);
          const [selectedScannedIds, setSelectedScannedIds] = useState([]);
          const [jsonInput, setJsonInput] = useState("");
          const [showJsonEditor, setShowJsonEditor] = useState(false);
          const [isSavingServer, setIsSavingServer] = useState(false);
          
          const [notification, setNotification] = useState(null);
          const progressInterval = useRef(null);
          const touchStartX = useRef(null);
          const touchEndX = useRef(null);

          const showNotification = useCallback((message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3000);
          }, []);

          // === CARGAR CONFIGURACIÓN DESDE GITHUB EN EL INICIO + CARGAR TOKEN LOCAL ===
          useEffect(() => {
            // Cargar token guardado en el navegador del administrador
            const savedToken = localStorage.getItem("fsnflix_github_token");
            if (savedToken) setGitHubToken(savedToken);

            const fetchAllDataFromGithub = async () => {
              const timestamp = new Date().getTime();
              
              // Cargar peliculas.json
              try {
                const resMovies = await fetch(`${GITHUB_CATALOG_URL}?t=${timestamp}`);
                if (resMovies.ok) {
                  const data = await resMovies.json();
                  if (Array.isArray(data) && data.length > 0) {
                    setMovies(data);
                    setPeliculasSync("Sincronizado");
                    setLastPeliculasTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                  }
                }
              } catch (e) {
                console.log("No se pudo cargar peliculas.json.");
                setPeliculasSync("Error");
              }

              // Cargar tienda_config.json
              try {
                const resStore = await fetch(`${GITHUB_STORE_URL}?t=${timestamp}`);
                if (resStore.ok) {
                  const data = await resStore.json();
                  if (data) {
                    if (data.globalSettings && data.globalSettings.slideSpeed) {
                      setSlideSpeed(data.globalSettings.slideSpeed);
                    }
                    if (Array.isArray(data.services)) {
                      const parsedServices = data.services.map(s => ({
                        ...s,
                        features: Array.isArray(s.features) ? s.features.join('\n') : s.features,
                        status: s.status || "Disponible",
                        badge: s.badge || ""
                      }));
                      setShopCatalog(parsedServices);
                      setTiendaSync("Sincronizado");
                      setLastTiendaTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    }
                  }
                }
              } catch (e) {
                console.log("No se pudo cargar tienda_config.json.");
                setTiendaSync("Error");
              }

              // Cargar index.html para edición directa en el nuevo tab
              try {
                const resIndex = await fetch(`${GITHUB_INDEX_URL}?t=${timestamp}`);
                if (resIndex.ok) {
                  const text = await resIndex.text();
                  setIndexHtmlCode(text);
                  setIndexSync("Sincronizado");
                  setLastIndexTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                  showNotification("Base de datos y archivos sincronizados desde tu nuevo GitHub.", "success");
                }
              } catch (e) {
                console.log("No se pudo cargar index.html.");
                setIndexSync("Error");
              }
            };

            fetchAllDataFromGithub();
          }, [showNotification]);

          // Guardar el Token en local storage cuando se escriba
          const handleTokenChange = (e) => {
              const token = e.target.value;
              setGitHubToken(token);
              localStorage.setItem("fsnflix_github_token", token);
          };

          // === ESCRIBIR DIRECTAMENTE EN GITHUB CON NOTIFICACIÓN Y MODAL DE ÉXITO ===
          const saveFileToGitHub = async (filename, contentString) => {
              const cleanToken = gitHubToken.trim();
              if (!cleanToken) {
                  setTokenError(true);
                  showNotification("¡Error! Ingresa tu Token de GitHub para guardar directamente.", "error");
                  setTimeout(() => setTokenError(false), 3000);
                  return;
              }
              setIsSavingServer(true);
              
              if (filename === "peliculas.json") setPeliculasSync("Sincronizando");
              else if (filename === "tienda_config.json") setTiendaSync("Sincronizando");
              else setIndexSync("Sincronizando");

              const path = filename; 
              const getUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;

              try {
                  // 1. Obtener el SHA actual del archivo remoto usando el header de Autorización Bearer universal
                  const getRes = await fetch(getUrl, {
                      headers: {
                          "Authorization": `Bearer ${cleanToken}`,
                          "Accept": "application/vnd.github.v3+json"
                      }
                  });

                  let sha = null;
                  if (getRes.ok) {
                      const getData = await getRes.json();
                      sha = getData.sha;
                  } else if (getRes.status !== 404) {
                      throw new Error("No se pudo obtener el historial del archivo en GitHub. Verifica tu Token.");
                  }

                  // 2. Formatear y convertir a Base64 compatible con UTF-8 de forma stack-overflow-safe
                  const utf8Bytes = new TextEncoder().encode(contentString);
                  const base64Content = bytesToBase64(utf8Bytes);

                  // 3. Sobreescribir el archivo en la rama principal (main)
                  const putBody = {
                      message: `Sincronización automatizada de ${filename} - FSNFLIX Panel`,
                      content: base64Content,
                      branch: "main"
                  };
                  if (sha) {
                      putBody.sha = sha;
                  }

                  const putRes = await fetch(getUrl, {
                      method: "PUT",
                      headers: {
                          "Authorization": `Bearer ${cleanToken}`,
                          "Content-Type": "application/json",
                          "Accept": "application/vnd.github.v3+json"
                      },
                      body: JSON.stringify(putBody)
                  });

                  if (putRes.ok) {
                      const timestampStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                      if (filename === "peliculas.json") {
                          setPeliculasSync("Sincronizado");
                          setLastPeliculasTime(timestampStr);
                      } else if (filename === "tienda_config.json") {
                          setTiendaSync("Sincronizado");
                          setLastTiendaTime(timestampStr);
                      } else {
                          setIndexSync("Sincronizado");
                          setLastIndexTime(timestampStr);
                      }
                      
                      // Desplegar Modal flotante de Éxito de Confirmación Directa
                      setShowSuccessModal({ filename, time: timestampStr });
                      showNotification(`¡${filename} guardado con éxito directamente en tu GitHub!`, "success");
                  } else {
                      const errData = await putRes.json();
                      throw new Error(errData.message || "Fallo al realizar el commit.");
                  }
              } catch (error) {
                  console.error(error);
                  if (filename === "peliculas.json") setPeliculasSync("Error");
                  else if (filename === "tienda_config.json") setTiendaSync("Error");
                  else setIndexSync("Error");
                  showNotification(`Error: ${error.message}`, "error");
              } finally {
                  setIsSavingServer(false);
              }
          };

          // Función para guardar peliculas.json en GitHub
          const commitCatalogToGitHub = () => {
              const content = JSON.stringify(movies, null, 2);
              saveFileToGitHub("peliculas.json", content);
          };

          // Función para guardar tienda_config.json en GitHub
          const commitStoreToGitHub = () => {
              const config = {
                  globalSettings: { slideSpeed: slideSpeed },
                  services: shopCatalog.map(s => ({
                      ...s,
                      features: Array.isArray(s.features) ? s.features : s.features.split('\n').map(f => f.trim()).filter(Boolean)
                  }))
              };
              const content = JSON.stringify(config, null, 2);
              saveFileToGitHub("tienda_config.json", content);
          };

          // Función para guardar index.html en GitHub
          const commitIndexToGitHub = () => {
              saveFileToGitHub("index.html", indexHtmlCode);
          };

          const nextSlide = useCallback(() => {
            if (movies.length === 0) return;
            setIsTransitioning(true);
            setTimeout(() => {
              setCurrentIndex(prev => (prev === movies.length - 1 ? 0 : prev + 1));
              setSlideProgress(0);
              setIsTransitioning(false);
            }, 300);
          }, [movies.length]);

          const prevSlide = () => {
            if (movies.length === 0) return;
            setIsTransitioning(true);
            setTimeout(() => {
              setCurrentIndex(prev => (prev === 0 ? movies.length - 1 : prev - 1));
              setSlideProgress(0);
              setIsTransitioning(false);
            }, 300);
          };

          // === PREVISUALIZADOR ROTATIVO CON VELOCIDAD EN TIEMPO REAL ===
          useEffect(() => {
            if (movies.length === 0 || viewTab !== "shop") return;
            const updateRate = 100;
            const step = (updateRate / slideSpeed) * 100;

            progressInterval.current = setInterval(() => {
              setSlideProgress(prev => {
                if (prev >= 100) {
                  nextSlide();
                  return 0;
                }
                return prev + step;
              });
            }, updateRate);

            return () => {
              if (progressInterval.current) clearInterval(progressInterval.current);
            };
          }, [nextSlide, movies.length, slideSpeed, viewTab]);

          const resetAutoplay = () => {
            setSlideProgress(0);
            if (progressInterval.current) {
              clearInterval(progressInterval.current);
            }
          };

          // === ESCÁNER OFICIAL TMDB MULTI-BÚSQUEDA ===
          const runSmartScanner = async () => {
            setIsScanning(true);
            setScannedCatalog([]);
            setSelectedScannedIds([]);

            const isSearchQuery = customSearchQuery.trim().length > 0;
            let urlMovie, urlTV;

            if (isSearchQuery) {
              urlMovie = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(customSearchQuery)}&language=es-MX&page=1`;
              urlTV = `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(customSearchQuery)}&language=es-MX&page=1`;
            } else {
              const providerId = PLATFORM_PROVIDERS[targetPlatform]?.id;
              if (!providerId) {
                urlMovie = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&language=es-MX&page=1`;
                urlTV = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&language=es-MX&page=1`;
              } else {
                urlMovie = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&with_watch_providers=${providerId}&watch_region=MX&sort_by=popularity.desc&language=es-MX&page=1`;
                urlTV = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&with_watch_providers=${providerId}&watch_region=MX&sort_by=popularity.desc&language=es-MX&page=1`;
              }

              if (minYear !== "Todos") {
                urlMovie += `&primary_release_date.gte=${minYear}-01-01`;
                urlTV += `&first_air_date.gte=${minYear}-01-01`;
              }
            }

            try {
              const [resM, resTV] = await Promise.all([fetch(urlMovie), fetch(urlTV)]);
              const [dataM, dataTV] = await Promise.all([resM.json(), resTV.json()]);

              let combined = [
                ...(dataM.results || []).map(m => ({ ...m, media_type: 'movie' })),
                ...(dataTV.results || []).map(m => ({ ...m, media_type: 'tv' }))
              ];

              combined.sort((a, b) => b.popularity - a.popularity);

              const formatted = combined
                .filter(item => item.poster_path && item.backdrop_path)
                .filter(item => {
                    if (minYear === "Todos") return true;
                    const release = item.release_date || item.first_air_date || "2000";
                    return parseInt(release.split("-")[0]) >= parseInt(minYear);
                })
                .slice(0, 15)
                .map(item => {
                    const release = item.release_date || item.first_air_date || "2026";
                    const genres = item.genre_ids ? item.genre_ids.map(id => TMDB_GENRES[id]).filter(Boolean) : ["Estreno"];
                    return {
                        id: `tmdb-${item.id}-${item.media_type}`,
                        title: item.title || item.name,
                        platform: targetPlatform, 
                        type: item.media_type === "tv" ? "Serie de TV" : "Película",
                        overview: item.overview || "Sin sinopsis disponible en español.",
                        rating: parseFloat(item.vote_average?.toFixed(1)) || 8.0,
                        releaseYear: release.split("-")[0],
                        duration: item.media_type === "tv" ? "Nueva Temporada" : "2h 10m",
                        genres: genres.length > 0 ? genres : ["Entretenimiento"],
                        backdropUrl: `https://image.tmdb.org/t/p/w1280${item.backdrop_path}`,
                        posterUrl: `https://image.tmdb.org/t/p/w500${item.poster_path}`
                    };
                });

              setScannedCatalog(formatted);
              if (formatted.length > 0) {
                showNotification(`Se escanearon ${formatted.length} títulos de ${targetPlatform}`, "success");
              } else {
                showNotification("No se encontraron estrenos para el criterio.", "error");
              }
            } catch (err) {
              console.error(err);
              showNotification("Error de red con TMDb.", "error");
            } finally {
              setIsScanning(false);
            }
          };

          const addSingleMovieToSlider = (movie) => {
            if (movies.some(m => m.title.toLowerCase() === movie.title.toLowerCase())) {
              showNotification("Este título ya está en el slider.", "error");
              return;
            }
            setMovies(prev => [movie, ...prev]);
            showNotification(`"${movie.title}" agregado al Slider`, "success");
          };

          const addSelectedMoviesInBulk = () => {
            if (selectedScannedIds.length === 0) return showNotification("Selecciona al menos un título.", "error");
            const toAdd = scannedCatalog.filter(m => selectedScannedIds.includes(m.id));
            const cleanAdd = toAdd.filter(newM => !movies.some(m => m.title.toLowerCase() === newM.title.toLowerCase()));
            if (cleanAdd.length === 0) return showNotification("Los seleccionados ya existen.", "error");
            setMovies(prev => [...cleanAdd, ...prev]);
            setSelectedScannedIds([]);
            showNotification(`¡${cleanAdd.length} títulos añadidos al Slider!`, "success");
          };

          const deleteMovieFromSlider = (id, e) => {
            e.stopPropagation();
            if (movies.length <= 1) return showNotification("Debe haber al menos 1 película.", "error");
            setMovies(prev => prev.filter(m => m.id !== id));
            setCurrentIndex(0); setSlideProgress(0);
            showNotification("Película eliminada.", "success");
          };

          const moveMovieOrder = (index, direction) => {
            const targetIndex = direction === 'up' ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= movies.length) return;
            const updated = [...movies];
            const temp = updated[index];
            updated[index] = updated[targetIndex];
            updated[targetIndex] = temp;
            setMovies(updated);
            setCurrentIndex(0);
            showNotification("Orden de reproducción actualizado.", "success");
          };

          // === GESTIÓN DE TIENDA ===
          const handleQuickAddService = (serviceObj) => {
              if (shopCatalog.some(s => s.id === serviceObj.id)) {
                  showNotification(`La plataforma ${serviceObj.name} ya está activa.`, "error");
                  return;
              }
              setShopCatalog(prev => [...prev, serviceObj]);
              setShowPlatformSelector(false);
              showNotification(`¡${serviceObj.name} añadido al catálogo de ventas!`, "success");
          };

          const openCustomServiceModal = () => {
              setShowPlatformSelector(false);
              setEditingStoreService({ id: `srv-${Date.now()}`, name: 'Suscripción Libre', color: '#dc2626', plan: 'Plan Personalizado', price: '19.90', logoUrl: '', features: 'Acceso Premium Completo\nSoporte Garantizado 24/7\nSin Caídas ni Bloqueos', btnText: '#ffffff', status: 'Disponible', badge: '' });
          };

          const saveStoreService = () => {
              if(!editingStoreService.name || !editingStoreService.price) return showNotification("Los campos Nombre y Precio son obligatorios", "error");
              setShopCatalog(prev => {
                  const exists = prev.findIndex(s => s.id === editingStoreService.id);
                  if (exists >= 0) {
                      const newArr = [...prev];
                      newArr[exists] = editingStoreService;
                      return newArr;
                  }
                  return [...prev, editingStoreService];
              });
              setEditingStoreService(null);
              showNotification("Suscripción comercial almacenada", "success");
          };

          const deleteStoreService = (id, e) => {
              if (e) e.stopPropagation(); 
              if(confirm("¿Seguro que deseas eliminar esta plataforma de la tienda?")) {
                  setShopCatalog(prev => prev.filter(s => s.id !== id));
                  showNotification("Plataforma eliminada de la tienda", "success");
              }
          };

          const toggleScannedSelection = (id) => {
            setSelectedScannedIds(prev => 
              prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
            );
          };

          const currentMovie = movies[currentIndex] || DEFAULT_MOVIES[0];
          const activeTheme = PLATFORM_THEMES[currentMovie?.platform] || { brandColor: "from-neutral-600 to-neutral-800", accentBg: "bg-neutral-600", borderActive: "border-neutral-600" };

          return (
            <div className="min-h-screen bg-neutral-950 text-white font-sans pb-16 relative">
              
              {/* MODAL DE ÉXITO DE SINCRONIZACIÓN GITHUB (CONFIRMACIÓN DIRECTA REQUERIDA) */}
              {showSuccessModal && (
                  <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[210] flex items-center justify-center p-4 animate-fade-in">
                      <div className="bg-[#111] border border-emerald-500/30 rounded-3xl p-8 max-w-md w-full text-center space-y-6 shadow-[0_20px_50px_rgba(16,185,129,0.15)] relative">
                          <div className="w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/40 flex items-center justify-center mx-auto text-3xl">
                              🎉
                          </div>
                          <div className="space-y-2">
                              <h3 className="text-xl font-black uppercase tracking-wider text-emerald-400">Sincronización Exitosa</h3>
                              <p className="text-sm text-neutral-200">
                                  El archivo <span className="font-mono text-emerald-300 font-bold bg-neutral-900 px-1.5 py-0.5 rounded">{showSuccessModal.filename}</span> se ha sobreescrito y guardado correctamente en tu repositorio de GitHub.
                              </p>
                              <p className="text-xs text-neutral-400">
                                  Los cambios se reflejarán automáticamente en vivo en FSNFLIX a las {showSuccessModal.time}.
                              </p>
                          </div>
                          <button 
                              onClick={() => setShowSuccessModal(null)}
                              className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs uppercase tracking-widest rounded-xl transition-all shadow-lg shadow-emerald-600/20 active:scale-95"
                          >
                              ¡Entendido, excelente!
                          </button>
                      </div>
                  </div>
              )}

              {/* Pantalla de carga para guardar directamente en GitHub */}
              {isSavingServer && (
                <div className="fixed inset-0 bg-black/85 backdrop-blur-md z-[200] flex flex-col items-center justify-center gap-4 transition-all duration-300">
                  <div className="relative flex items-center justify-center">
                    <div className="w-16 h-16 rounded-full border-t-4 border-red-655 border-r-4 border-r-transparent animate-spin" />
                    <span className="absolute text-xs font-black text-red-500">FSN</span>
                  </div>
                  <div className="text-center space-y-1">
                    <h3 className="text-lg font-black uppercase tracking-widest text-white animate-pulse">Escribiendo commit en GitHub...</h3>
                    <p className="text-xs text-neutral-400">Actualizando tus archivos .json directamente en tu rama principal.</p>
                  </div>
                </div>
              )}

              {notification && (
                <div className="fixed top-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl bg-neutral-900 border border-neutral-850 shadow-2xl animate-fade-in">
                  <span className={`w-2.5 h-2.5 rounded-full ${notification.type === 'error' ? 'bg-amber-500' : 'bg-emerald-500'}`} />
                  <p className="text-xs font-black uppercase tracking-wider text-white">{notification.message}</p>
                </div>
              )}

              {/* NAVEGACIÓN SUPERIOR FIJA DEL COMMAND CENTER */}
              <header className="fixed top-0 left-0 w-full z-[140] bg-black/95 backdrop-blur-md px-6 py-4 md:px-12 flex flex-col xl:flex-row justify-between items-center border-b border-white/5 gap-4">
                <div className="flex flex-col md:flex-row items-center gap-6 w-full xl:w-auto">
                  <span className="text-red-655 font-black text-3xl tracking-tighter">FSNFLIX<span className="text-white text-base font-medium opacity-40 ml-2">CONTROL</span></span>
                  <div className="flex bg-neutral-900 p-1 rounded-xl border border-neutral-800 flex-wrap gap-1">
                    <button onClick={() => setViewTab('shop')} className={`px-3 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${viewTab === 'shop' ? 'bg-red-650 text-white shadow-lg' : 'text-neutral-400 hover:text-white'}`}>🎪 Tienda de Cuentas</button>
                    <button onClick={() => setViewTab('staged')} className={`px-3 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${viewTab === 'staged' ? 'bg-red-650 text-white shadow-lg' : 'text-neutral-400 hover:text-white'}`}>🎬 Slider Estrenos ({movies.length})</button>
                    <button onClick={() => setViewTab('scan')} className={`px-3 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${viewTab === 'scan' ? 'bg-red-650 text-white shadow-lg' : 'text-neutral-400 hover:text-white'}`}>🔍 Escáner (TMDB)</button>
                    <button onClick={() => setViewTab('indexEditor')} className={`px-3 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${viewTab === 'indexEditor' ? 'bg-red-650 text-white shadow-lg' : 'text-neutral-400 hover:text-white'}`}>🌐 index.html</button>
                  </div>
                </div>

                {/* LLAVE DE ACCESO DIRECTO A GITHUB (TOKEN PAT CON SOPORTE COMPLETO DE AUTORIZACIÓN PARA EL NUEVO GITHUB) */}
                <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto justify-end">
                    <input 
                        type="password" 
                        value={gitHubToken}
                        onChange={handleTokenChange}
                        placeholder="Token de Acceso GitHub..."
                        className={`bg-neutral-900 border px-4 py-2 rounded-xl text-xs outline-none font-mono w-full sm:w-56 placeholder-neutral-600 transition-colors ${
                          tokenError ? 'border-red-500 ring-2 ring-red-500/20 text-red-500 animate-pulse' : 'border-neutral-800 text-emerald-400 focus:border-emerald-500'
                        }`}
                        title="Tu GitHub Token de escritura personal. Se almacena localmente en tu navegador."
                    />
                    <div className="h-6 w-px bg-neutral-800 hidden xl:block" />
                    
                    <button 
                        onClick={commitCatalogToGitHub} 
                        disabled={isSavingServer}
                        className="px-3.5 py-2 bg-neutral-900 hover:bg-neutral-850 border border-neutral-800 rounded-lg text-[10px] font-black uppercase tracking-widest text-neutral-300 hover:text-white flex items-center gap-1.5 active:scale-95 disabled:opacity-40"
                    >
                        {peliculasSync === "Sincronizando" ? "⏳ Guardando..." : "✓ Guardar peliculas.json"}
                    </button>
                    
                    <button 
                        onClick={commitStoreToGitHub} 
                        disabled={isSavingServer}
                        className="px-3.5 py-2 bg-neutral-900 hover:bg-neutral-850 border border-neutral-800 rounded-lg text-[10px] font-black uppercase tracking-widest text-neutral-300 hover:text-white flex items-center gap-1.5 active:scale-95 disabled:opacity-40"
                    >
                        {tiendaSync === "Sincronizando" ? "⏳ Guardando..." : "✓ Guardar tienda_config.json"}
                    </button>

                    <button 
                        onClick={commitIndexToGitHub} 
                        disabled={isSavingServer}
                        className="px-3.5 py-2 bg-red-655 hover:bg-red-600 rounded-lg text-[10px] font-black uppercase tracking-widest text-white shadow-lg shadow-red-600/10 flex items-center gap-1.5 active:scale-95 disabled:opacity-40"
                    >
                        {indexSync === "Sincronizando" ? "⏳ Guardando..." : "✓ Guardar index.html"}
                    </button>
                </div>
              </header>

              {/* LIVE SIMULATOR SLIDER RESTABLECIDO EN PESTAÑA PRINCIPAL */}
              {viewTab === "shop" && (
                <section className="relative w-full h-[55vh] min-h-[450px] flex items-end overflow-hidden bg-black select-none mt-[80px]">
                  {movies.map((movie, index) => (
                    <div key={movie.id} className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                      <img src={movie.backdropUrl} alt={movie.title} referrerPolicy="no-referrer" className="w-full h-full object-cover object-center transform transition-transform duration-[8000ms]" />
                      <div className="absolute inset-0 bg-gradient-to-t from-neutral-950 via-neutral-950/40 to-transparent" />
                      <div className="absolute inset-0 bg-gradient-to-r from-black/95 via-transparent to-transparent" />
                    </div>
                  ))}
                  
                  {movies.length > 0 && (
                    <div className="absolute bottom-12 right-6 md:right-12 z-35 pointer-events-none hidden sm:block">
                      <PlatformLogo platform={currentMovie?.platform} sizeClass="h-10 md:h-14" shopCatalog={shopCatalog} />
                    </div>
                  )}

                  {movies.length > 0 && (
                    <div className="relative z-20 w-full max-w-7xl mx-auto px-6 md:px-12 pb-12 pt-28">
                      <div className="max-w-2xl space-y-3.5 text-left">
                        <div className="flex items-center gap-2 text-xs font-bold">
                          <span className="bg-red-650/90 text-white px-3 py-1 rounded text-[10px] uppercase font-black">{currentMovie?.type}</span>
                          <span className="text-yellow-500">★ {currentMovie?.rating}</span>
                          <span className="text-neutral-400">• {currentMovie?.releaseYear}</span>
                        </div>
                        <h1 className="text-3xl sm:text-5xl md:text-6xl font-black uppercase tracking-tight leading-none text-white text-shadow-cinematic">{currentMovie?.title}</h1>
                        <p className="text-xs sm:text-sm md:text-base text-neutral-200 line-clamp-2 leading-relaxed max-w-xl text-shadow-cinematic">{currentMovie?.overview}</p>
                      </div>
                    </div>
                  )}
                </section>
              )}

              {/* CONTROL DE VELOCIDAD DEL SLIDER RESTABLECIDO JUSTO DEBAJO EN TIEMPO REAL */}
              {viewTab === "shop" && (
                <div className="bg-neutral-900 border-b border-neutral-800 py-4 px-6 md:px-12 flex flex-col md:flex-row items-center justify-between gap-4">
                  <div className="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                    <span className="text-xs font-black uppercase tracking-widest text-neutral-400 whitespace-nowrap">Velocidad: <span className="text-red-500 ml-1">{slideSpeed/1000} Segundos</span></span>
                    <input type="range" min="1000" max="10000" step="1000" value={slideSpeed} onChange={e => { setSlideSpeed(Number(e.target.value)); resetAutoplay(); }} className="w-48 md:w-64 h-1.5 bg-neutral-955 rounded-lg appearance-none cursor-pointer accent-red-655" />
                  </div>
                  <div className="w-full md:flex-1 md:ml-12 flex flex-col gap-1.5">
                    <div className="w-full h-[3.5px] bg-neutral-950 rounded-full overflow-hidden">
                      <div className={`h-full transition-all ease-linear ${activeTheme?.accentBg || 'bg-red-600'}`} style={{ width: `${slideProgress}%` }} />
                    </div>
                    <div className="flex justify-end gap-1.5">
                      {movies.map((_, idx) => (
                        <button key={idx} onClick={() => { setCurrentIndex(idx); resetAutoplay(); }} className={`h-2  rounded-full transition-all duration-300 ${idx === currentIndex ? `${activeTheme?.accentBg || 'bg-red-655'} w-6` : 'bg-neutral-800 w-2 hover:bg-neutral-600'}`} />
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* RENDERIZACIÓN DE CONTENIDOS DE ADMIN */}
              <main className="max-w-7xl mx-auto px-6 py-10 mt-[80px]">

                {/* VISTA 1: TIENDA OFICIAL DE SUSCRIPCIONES */}
                {viewTab === 'shop' && (
                  <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b border-neutral-900 pb-6">
                      <div>
                        <h2 className="text-3xl font-black uppercase tracking-tight">Cuentas y Plataformas</h2>
                        <p className="text-neutral-500 text-xs mt-1">Administra tus perfiles comerciales. Puedes marcar stock de disponibilidad y etiquetas promocionales.</p>
                      </div>
                      <button onClick={() => setShowPlatformSelector(true)} className="px-5 py-3 bg-red-650 hover:bg-red-600 text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-lg">+ Añadir Plataforma de Reventa</button>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                      {shopCatalog.map(service => {
                        const featuresList = getFeaturesList(service.features);
                        const isAgotado = service.status === "Agotado";
                        
                        return (
                          <div key={service.id} className={`premium-card rounded-2xl p-6 md:p-8 flex flex-col relative overflow-hidden h-full ${isAgotado ? 'opacity-80' : ''}`} style={{ borderTopWidth: '5px', borderTopStyle: 'solid', borderTopColor: isAgotado ? '#404040' : service.color }}>
                             
                             {/* Botones de acción flotantes (SIEMPRE VISIBLES DE FORMA ELEGANTE Y COMPATIBLES CON MÓVIL/TÁCTIL) */}
                             <div className="absolute top-3 right-3 flex gap-1.5 z-30">
                               <button 
                                 onClick={() => setEditingStoreService({ ...service, features: Array.isArray(service.features) ? service.features.join('\n') : service.features })} 
                                 className="bg-neutral-950/90 hover:bg-blue-600 p-2.5 rounded-xl border border-white/10 text-white transition-all shadow-md active:scale-95"
                                 title="Editar plataforma"
                               >
                                 ✏️
                               </button>
                               <button 
                                 onClick={(e) => deleteStoreService(service.id, e)} 
                                 className="bg-neutral-950/90 hover:bg-red-655 p-2.5 rounded-xl border border-white/10 text-white transition-all shadow-md active:scale-95"
                                 title="Eliminar plataforma"
                               >
                                 🗑️
                               </button>
                             </div>

                             {/* Sincronización de insignias promocionales y de stock */}
                             {service.badge && !isAgotado && (
                               <div className={`absolute top-4 left-4 z-20 text-[9px] font-black uppercase px-2.5 py-1.5 rounded-md tracking-wider shadow-md ${
                                 service.badge.toUpperCase() === "OFERTA" ? "bg-gradient-to-r from-red-655 to-orange-500 text-white animate-pulse" :
                                 service.badge.toUpperCase() === "RECOMENDADO" ? "bg-gradient-to-r from-emerald-500 to-teal-600 text-white" :
                                 "bg-gradient-to-r from-blue-500 to-indigo-600 text-white"
                               }`}>
                                 {service.badge}
                               </div>
                             )}

                             {isAgotado && (
                               <div className="absolute top-4 left-4 z-20 text-[9px] font-black uppercase px-2.5 py-1.5 rounded-md tracking-wider shadow-md bg-neutral-800 border border-neutral-700 text-neutral-400">
                                 SIN STOCK
                               </div>
                             )}

                             <div className="h-10 mb-5 flex items-center justify-start brand-logo-container mt-8 sm:mt-10">
                               {service.logoUrl ? <img src={service.logoUrl} className="max-h-[35px] max-w-[140px] object-contain" alt={service.name} /> : <span className="font-black text-xl uppercase" style={{ color: service.color }}>{service.name}</span>}
                             </div>

                             <div className="text-[10px] uppercase font-bold tracking-widest mb-0.5 text-neutral-500">{service.plan}</div>
                             <div className="flex items-baseline gap-1 mb-6">
                               <span className="text-sm font-bold text-neutral-500">S/</span>
                               <span className="text-3xl font-black text-white">{service.price}</span>
                             </div>

                             <ul className="space-y-3 flex-grow mb-6">
                               {featuresList.map((feat, i) => (
                                 <li key={i} className="text-xs font-medium text-neutral-400 flex items-start gap-2">
                                   <span style={{ color: isAgotado ? '#606060' : service.color }}>•</span> <span>{feat}</span>
                                 </li>
                               ))}
                             </ul>

                             <div className="w-full py-3 rounded-xl text-center font-black text-[10px] uppercase tracking-widest opacity-40 cursor-not-allowed" style={{ backgroundColor: isAgotado ? '#2e2e33' : service.color, color: isAgotado ? '#8a8a93' : (service.btnText || '#ffffff'), border: isAgotado ? '1px solid #43434d' : 'none' }}>
                               {isAgotado ? "Consultar Stock ⚡" : "Adquirir Cuenta"}
                             </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* VISTA 2: ESTRENOS DEL SLIDER (ORDENACIÓN Y ELIMINACIÓN DE PELICULAS.JSON) */}
                {viewTab === 'staged' && (
                  <div className="space-y-8 animate-fade-in">
                    <div className="border-b border-neutral-900 pb-6 flex justify-between items-end">
                      <div>
                        <h2 className="text-3xl font-black uppercase tracking-tight">Estrenos del Slider</h2>
                        <p className="text-neutral-500 text-xs mt-1">Reordena mediante las flechas de ordenación o depura tu base de datos de películas.</p>
                      </div>
                      <button onClick={() => setShowJsonEditor(!showJsonEditor)} className="px-4 py-2 bg-neutral-900 border border-neutral-800 text-xs rounded-xl font-bold">{showJsonEditor ? "Ocultar Editor" : "Ver Editor JSON"}</button>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                      {movies.map((movie, index) => {
                        return (
                          <div key={movie.id} className="bg-neutral-900/30 rounded-2xl overflow-hidden border border-neutral-900 hover:border-neutral-800 transition-all flex flex-col justify-between">
                            <div className="relative aspect-[2/3] overflow-hidden bg-neutral-950">
                              <img src={movie.posterUrl} referrerPolicy="no-referrer" className="w-full h-full object-cover" />
                              <div className="absolute top-2 left-2 bg-black/80 px-2 py-1 rounded text-[8px] font-black uppercase border border-white/5">{movie.platform}</div>
                              <button onClick={(e) => deleteMovieFromSlider(movie.id, e)} className="absolute top-2 right-2 bg-red-655 hover:bg-red-700 p-1.5 rounded-lg border border-red-500 transition-colors z-20"><svg className="h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></button>
                            </div>
                            <div className="p-3 bg-neutral-950 space-y-3">
                              <h4 className="font-bold text-xs truncate text-white leading-none">{movie.title}</h4>
                              <div className="flex gap-1">
                                <button disabled={index === 0} onClick={() => moveMovieOrder(index, 'up')} className="flex-1 py-1 bg-neutral-900 hover:bg-neutral-850 text-[10px] font-bold rounded border border-neutral-800 disabled:opacity-30">▲</button>
                                <button disabled={index === movies.length - 1} onClick={() => moveMovieOrder(index, 'down')} className="flex-1 py-1 bg-neutral-900 hover:bg-neutral-855 text-[10px] font-bold rounded border border-neutral-800 disabled:opacity-30">▼</button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {showJsonEditor && (
                      <div className="bg-neutral-900/40 border border-neutral-900 rounded-3xl p-6 md:p-8 space-y-4 animate-fade-in mt-6">
                        <div className="flex justify-between items-center">
                          <h4 className="font-bold text-white text-xs uppercase tracking-widest">Base de Datos JSON de Estrenos</h4>
                          <button onClick={copyJSONToClipboard} className="px-4 py-2 bg-red-655 text-xs font-black uppercase rounded-lg">Copiar JSON</button>
                        </div>
                        <textarea value={jsonInput} onChange={handleImportJson} rows={10} className="w-full bg-black text-emerald-400 font-mono text-xs p-4 rounded-xl border border-neutral-850 outline-none" />
                      </div>
                    )}
                  </div>
                )}

                {/* VISTA 3: ESCÁNER TMDB */}
                {viewTab === 'scan' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in">
                    <div className="bg-neutral-900/40 border border-neutral-900 p-6 rounded-3xl h-max space-y-5">
                      <div className="space-y-1">
                        <h3 className="text-lg font-black uppercase tracking-wider text-white">Filtros de Escaneo</h3>
                        <p className="text-neutral-500 text-xs">Consulta tendencias de streaming oficiales en vivo con TMDb.</p>
                      </div>
                      
                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Asignar Plataforma</label>
                        <select value={targetPlatform} onChange={e => setTargetPlatform(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 cursor-pointer">
                          {VIDEO_PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Año Mínimo de Estreno</label>
                        <select value={minYear} onChange={e => setMinYear(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-655 cursor-pointer">
                          <option value="Todos">Todos los años</option>
                          <option value="2024">Desde 2024</option>
                          <option value="2025">Desde 2025</option>
                          <option value="2026">2026 (Exclusivo)</option>
                        </select>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Filtro por Nombre / Palabra Clave</label>
                        <input type="text" value={customSearchQuery} onChange={e => setCustomSearchQuery(e.target.value)} placeholder="Ej: Avengers, The Boys, Anime..." className="w-full bg-neutral-950 border border-neutral-850 px-4 py-3 rounded-xl text-xs text-white outline-none focus:border-red-650 transition-colors" />
                      </div>

                      <button onClick={runSmartScanner} disabled={isScanning} className="w-full py-4 bg-white text-black text-xs font-black uppercase tracking-widest rounded-xl hover:bg-neutral-200 transition-all">
                        {isScanning ? 'Sincronizando...' : 'Iniciar Escaneo de Estrenos'}
                      </button>
                    </div>

                    <div className="lg:col-span-2 space-y-4">
                      <div className="flex justify-between items-center">
                        <h4 className="font-bold text-sm uppercase tracking-wider text-neutral-400">Resultados del Buscador</h4>
                        {scannedCatalog.length > 0 && <button onClick={addSelectedMoviesInBulk} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-xs font-black uppercase transition-all">Inyectar Selección ({selectedScannedIds.length})</button>}
                      </div>
                      
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {scannedCatalog.map(movie => {
                          const isChecked = selectedScannedIds.includes(movie.id);
                          return (
                            <div key={movie.id} className={`p-4 rounded-2xl bg-neutral-950 border flex gap-3 relative cursor-pointer ${isChecked ? 'border-emerald-500' : 'border-neutral-900'}`} onClick={() => toggleScannedSelection(movie.id)}>
                              <input type="checkbox" checked={isChecked} onChange={(e) => { e.stopPropagation(); toggleScannedSelection(movie.id); }} className="absolute top-3 right-3 z-20 w-4 h-4 accent-emerald-500 cursor-pointer" />
                              <img src={movie.posterUrl} referrerPolicy="no-referrer" className="w-16 h-24 rounded-lg object-cover bg-neutral-900 shrink-0 border border-neutral-800" />
                              <div className="flex-1 min-w-0 flex flex-col justify-between">
                                <div>
                                  <span className="text-[9px] font-extrabold uppercase text-neutral-500">{movie.type} • {movie.releaseYear}</span>
                                  <h5 className="font-bold text-xs truncate text-white mt-0.5">{movie.title}</h5>
                                </div>
                                <div className="flex justify-between items-center pt-2">
                                  <span className="text-[10px] text-yellow-500 font-bold">★ {movie.rating?.toFixed(1)}</span>
                                  <button onClick={(e) => { e.stopPropagation(); addSingleMovieToSlider(movie); }} className="px-3 py-1.5 bg-neutral-900 border border-neutral-800 text-[9px] font-bold rounded text-white hover:bg-neutral-800">+ Añadir</button>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                        {scannedCatalog.length === 0 && <div className="col-span-full py-16 text-center text-neutral-600 text-xs font-bold border-2 border-dashed border-neutral-900 rounded-3xl">Utiliza el buscador izquierdo para escanear y cargar estrenos.</div>}
                      </div>
                    </div>
                  </div>
                )}

                {/* VISTA 4: EDITOR DIRECTO DE INDEX.HTML */}
                {viewTab === 'indexEditor' && (
                  <div className="space-y-6 animate-fade-in">
                    <div className="border-b border-neutral-900 pb-4 flex justify-between items-end flex-wrap gap-4">
                      <div>
                        <h2 className="text-3xl font-black uppercase tracking-tight">Estructura index.html</h2>
                        <p className="text-neutral-500 text-xs mt-1">Este editor interactivo te permite revisar y sincronizar de forma directa el diseño visual de la web principal de tus clientes.</p>
                      </div>
                      <div className="flex gap-2">
                        <button 
                            onClick={commitIndexToGitHub}
                            disabled={isSavingServer}
                            className="px-5 py-3 bg-red-655 hover:bg-red-600 text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-lg active:scale-95 disabled:opacity-40"
                        >
                            ✓ Subir index.html a GitHub
                        </button>
                      </div>
                    </div>

                    <div className="bg-neutral-900/40 border border-neutral-900 p-6 rounded-3xl space-y-4">
                      <div className="flex justify-between items-center">
                        <span className="text-red-550 font-black text-xs uppercase tracking-widest">Código Fuente HTML/React</span>
                        <span className="text-xs text-neutral-500">Último commit local: {lastIndexTime || 'Nunca'}</span>
                      </div>
                      <textarea 
                        value={indexHtmlCode} 
                        onChange={(e) => setIndexHtmlCode(e.target.value)}
                        rows={16}
                        className="w-full bg-black text-neutral-250 font-mono text-xs p-5 rounded-2xl border border-neutral-850 outline-none focus:border-red-600 leading-relaxed scrollbar-thin"
                        placeholder="Código de index.html..."
                      />
                    </div>
                  </div>
                )}

              </main>

              {/* MODAL: SELECTOR MAESTRO DE PLATAFORMA */}
              {showPlatformSelector && (
                <div className="fixed inset-0 z-[160] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-fade-in">
                    <div className="bg-neutral-900 border border-neutral-800 max-w-4xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-neutral-800 flex justify-between items-center bg-black/40">
                            <div>
                                <h3 className="text-xl font-black uppercase tracking-wider">Añadir Suscripción a la Tienda</h3>
                                <p className="text-xs text-neutral-400">Selecciona una de las plantillas premium integradas o crea una libre.</p>
                            </div>
                            <button onClick={() => setShowPlatformSelector(false)} className="text-neutral-500 hover:text-white font-black text-2xl">&times;</button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto space-y-6 flex-1 bg-neutral-950/50">
                            {/* Botón de Estilo Libre */}
                            <button onClick={openCustomServiceModal} className="w-full bg-neutral-900 hover:bg-neutral-850 border-2 border-neutral-800 border-dashed rounded-2xl p-6 flex flex-col items-center justify-center text-center transition-colors group">
                                <span className="text-3xl mb-1.5 group-hover:scale-110 transition-transform">✨</span>
                                <h4 className="text-sm font-black text-white uppercase tracking-widest">Crear Plataforma Libre (Logo Personalizado)</h4>
                                <p className="text-xs text-neutral-500 mt-1">Parámetros automáticos estáticos adaptables para mantener la coherencia estética de tu web principal.</p>
                            </button>

                            <div>
                                <h4 className="text-xs font-black uppercase tracking-widest text-neutral-500 mb-4 border-b border-neutral-800 pb-2">Catálogo de Integración Rápida</h4>
                                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {MASTER_SERVICES_DB.map(service => {
                                        if (shopCatalog.some(s => s.id === service.id)) return null;
                                        return (
                                            <button key={service.id} onClick={() => handleQuickAddService(service)} className="bg-neutral-900 border border-neutral-800 hover:border-neutral-700 rounded-xl p-4 flex flex-col items-center gap-3 transition-all h-24 justify-center" style={{ borderTopWidth: '3px', borderTopColor: service.color }}>
                                                <div className="h-6 flex items-center justify-center">
                                                    {service.logoUrl ? <img src={service.logoUrl} className="max-h-full object-contain" alt={service.name} /> : <span className="text-xs font-bold text-white uppercase">{service.name}</span>}
                                                </div>
                                                <span className="text-[9px] font-black uppercase text-neutral-500 tracking-wider">Inyectar</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
              )}

              {/* MODAL CREADOR/EDITOR DE SERVICIOS */}
              {editingStoreService && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-fade-in">
                    <div className="bg-neutral-900 border border-neutral-800 max-w-2xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-neutral-800 flex justify-between items-center bg-black/50">
                            <h3 className="text-xl font-black uppercase tracking-wider">{editingStoreService.id.includes('srv-') ? 'Crear Plataforma' : 'Editar Parámetros de Suscripción'}</h3>
                            <button onClick={() => setEditingStoreService(null)} className="text-neutral-400 hover:text-white font-black text-xl">&times;</button>
                        </div>

                        <div className="p-6 overflow-y-auto space-y-5 flex-1">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Nombre de la Marca</label>
                                    <input type="text" value={editingStoreService.name} onChange={e => setEditingStoreService({...editingStoreService, name: e.target.value})} placeholder="Ej: Crunchyroll" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 text-white font-bold" />
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">URL del Logo (PNG/SVG Enlace Libre)</label>
                                    <input type="text" value={editingStoreService.logoUrl} onChange={e => setEditingStoreService({...editingStoreService, logoUrl: e.target.value})} placeholder="https://..." className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 text-blue-400 font-mono" />
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Color Identitario (HEX)</label>
                                    <div className="flex items-center gap-2 bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2">
                                        <input type="color" value={editingStoreService.color} onChange={e => setEditingStoreService({...editingStoreService, color: e.target.value})} className="w-8 h-8 rounded bg-transparent cursor-pointer outline-none" />
                                        <input type="text" value={editingStoreService.color} onChange={e => setEditingStoreService({...editingStoreService, color: e.target.value})} className="w-full bg-transparent text-sm outline-none font-mono uppercase text-white" />
                                    </div>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Subtítulo / Tipo de Plan</label>
                                    <input type="text" value={editingStoreService.plan} onChange={e => setEditingStoreService({...editingStoreService, plan: e.target.value})} placeholder="Ej: Plan Familiar" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 text-white" />
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Precio Comercial (S/)</label>
                                    <input type="text" value={editingStoreService.price} onChange={e => setEditingStoreService({...editingStoreService, price: e.target.value})} placeholder="Ej: 24.90" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm font-bold text-emerald-400 outline-none focus:border-red-500" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 border-y border-neutral-800/60 py-4 my-2">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Disponibilidad (Stock)</label>
                                    <select value={editingStoreService.status} onChange={e => setEditingStoreService({...editingStoreService, status: e.target.value})} className={`w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 cursor-pointer font-bold ${editingStoreService.status === 'Agotado' ? 'text-red-500' : 'text-emerald-500'}`}>
                                        <option value="Disponible">🟢 Stock Disponible</option>
                                        <option value="Agotado">🔴 Sin Stock (Agotado)</option>
                                    </select>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block">Etiqueta Promocional (Badge)</label>
                                    <select value={editingStoreService.badge} onChange={e => setEditingStoreService({...editingStoreService, badge: e.target.value})} className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 cursor-pointer text-white font-bold">
                                        <option value="">(Ninguna)</option>
                                        <option value="OFERTA">Oferta Especial (Neón)</option>
                                        <option value="RECOMENDADO">Recomendado (Verde)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="space-y-1.5">
                                <label className="text-[10px] font-black uppercase text-neutral-500 tracking-widest block flex justify-between">
                                    <span>Lista de Beneficios</span>
                                    <span>Escribe un ítem por renglón</span>
                                </label>
                                <textarea value={editingStoreService.features} onChange={e => setEditingStoreService({...editingStoreService, features: e.target.value})} rows="5" placeholder="Calidad Ultra HD&#10;Garantía por 30 días&#10;Dispositivos Simultáneos" className="w-full bg-neutral-950 border border-neutral-800 px-4 py-3 rounded-xl text-sm outline-none focus:border-red-500 resize-none text-white leading-relaxed font-semibold" />
                            </div>

                        </div>

                        <div className="p-6 border-t border-neutral-850 flex justify-end gap-3 bg-black/50">
                            <button onClick={() => setEditingStoreService(null)} className="px-6 py-3 bg-neutral-800 hover:bg-neutral-700 text-white rounded-xl font-bold text-xs uppercase tracking-widest transition-colors">Cerrar</button>
                            <button onClick={saveStoreService} className="px-8 py-3 bg-red-655 hover:bg-red-600 text-white rounded-xl font-black text-xs uppercase tracking-widest transition-colors shadow-lg">Aplicar Cambios</button>
                        </div>
                    </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
